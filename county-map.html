<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>County Map — Routesmith POC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #e8a838;
      --text:      #e2e4ec;
      --muted:     #6b6f80;
      --font-ui:   'DM Mono', 'Courier New', monospace;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .rs-mark {
      font-family: var(--font-ui);
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .rs-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
    }

    header h1 {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .status-pill {
      margin-left: auto;
      font-family: var(--font-ui);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--border);
      color: var(--muted);
    }
    .status-pill.loaded { color: var(--accent); border: 1px solid var(--accent)33; }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #map {
      flex: 1;
      height: 100%;
    }

    .panel {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-label {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .county-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .county-item {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border)88;
      cursor: pointer;
      transition: background 0.15s;
    }
    .county-item:hover { background: var(--border)44; }
    .county-item.active { background: var(--accent)11; border-left: 2px solid var(--accent); }

    .county-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .county-state {
      font-family: var(--font-ui);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .finder-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .finder-chip {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      font-family: var(--font-ui);
      border: 1px solid currentColor;
      opacity: 0.85;
    }
    .finder-chip.new-find { font-weight: 700; }

    .info-box {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .url-source {
      background: var(--accent)18;
      border: 1px solid var(--accent)44;
      border-radius: 4px;
      padding: 6px 10px;
      font-family: var(--font-ui);
      font-size: 10px;
      color: var(--accent);
      word-break: break-all;
    }

    /* Pattern overlay canvas hack for map polygons */
    .legend {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
    }
    .legend-swatch {
      width: 24px;
      height: 14px;
      border-radius: 2px;
      border: 1px solid #ffffff22;
      flex-shrink: 0;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const GOOGLE_MAPS_API_KEY = 'AIzaSyDUocvfkOfu3yJ-ptPxMbwz-AddHmHDyzg';

// Census TIGER GeoJSON for US counties (2022)
const COUNTY_GEOJSON_URL = 'https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json';

// State FIPS lookup
const STATE_FIPS = {
  AL:'01',AK:'02',AZ:'04',AR:'05',CA:'06',CO:'08',CT:'09',DE:'10',FL:'12',GA:'13',
  HI:'15',ID:'16',IL:'17',IN:'18',IA:'19',KS:'20',KY:'21',LA:'22',ME:'23',MD:'24',
  MA:'25',MI:'26',MN:'27',MS:'28',MO:'29',MT:'30',NE:'31',NV:'32',NH:'33',NJ:'34',
  NM:'35',NY:'36',NC:'37',ND:'38',OH:'39',OK:'40',OR:'41',PA:'42',RI:'44',SC:'45',
  SD:'46',TN:'47',TX:'48',UT:'49',VT:'50',VA:'51',WA:'53',WV:'54',WI:'55',WY:'56',
  DC:'11'
};

const STATE_NAMES = {
  '01':'Alabama','02':'Alaska','04':'Arizona','05':'Arkansas','06':'California',
  '08':'Colorado','09':'Connecticut','10':'Delaware','12':'Florida','13':'Georgia',
  '15':'Hawaii','16':'Idaho','17':'Illinois','18':'Indiana','19':'Iowa','20':'Kansas',
  '21':'Kentucky','22':'Louisiana','23':'Maine','24':'Maryland','25':'Massachusetts',
  '26':'Michigan','27':'Minnesota','28':'Mississippi','29':'Missouri','30':'Montana',
  '31':'Nebraska','32':'Nevada','33':'New Hampshire','34':'New Jersey','35':'New Mexico',
  '36':'New York','37':'North Carolina','38':'North Dakota','39':'Ohio','40':'Oklahoma',
  '41':'Oregon','42':'Pennsylvania','44':'Rhode Island','45':'South Carolina',
  '46':'South Dakota','47':'Tennessee','48':'Texas','49':'Utah','50':'Vermont',
  '51':'Virginia','53':'Washington','54':'West Virginia','55':'Wisconsin','56':'Wyoming',
  '11':'District of Columbia'
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let map, allCountyData, mapData;
let countyFeatures = {};      // fips -> GeoJSON feature
let countyPolygons = {};      // fips -> google.maps.Data feature
let activeFeature = null;

// ═══════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════
async function loadMapData() {
  // Option C: URL param override
  const params = new URLSearchParams(window.location.search);
  const dataUrl = params.get('data');

  if (dataUrl) {
    document.getElementById('dataSourceDisplay').textContent = dataUrl;
    try {
      const resp = await fetch(dataUrl);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      mapData = await resp.json();
    } catch(e) {
      console.error('Failed to load URL data, falling back to embedded JSON:', e);
      mapData = getEmbeddedData();
      document.getElementById('dataSourceDisplay').textContent = 'embedded JSON (fallback)';
    }
  } else {
    mapData = getEmbeddedData();
  }

  return mapData;
}

function getEmbeddedData() {
  const el = document.getElementById('mapData');
  return JSON.parse(el.textContent);
}

// ═══════════════════════════════════════════
// PATTERN RENDERING
// Build SVG data-URI patterns for map overlays
// ═══════════════════════════════════════════
function makePatternIcon(color, pattern) {
  const c = color;
  let svg = '';
  if (pattern === 'solid') {
    // Solid fill handled directly via fillColor
    return null;
  } else if (pattern === 'hatch') {
    svg = `<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10'>
      <rect width='10' height='10' fill='${c}' fill-opacity='0.15'/>
      <line x1='0' y1='0' x2='10' y2='10' stroke='${c}' stroke-width='1.5' stroke-opacity='0.7'/>
      <line x1='-5' y1='5' x2='5' y2='-5' stroke='${c}' stroke-width='1.5' stroke-opacity='0.7'/>
      <line x1='5' y1='15' x2='15' y2='5' stroke='${c}' stroke-width='1.5' stroke-opacity='0.7'/>
    </svg>`;
  } else if (pattern === 'dots') {
    svg = `<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10'>
      <rect width='10' height='10' fill='${c}' fill-opacity='0.1'/>
      <circle cx='5' cy='5' r='2' fill='${c}' fill-opacity='0.75'/>
    </svg>`;
  } else if (pattern === 'crosshatch') {
    svg = `<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10'>
      <rect width='10' height='10' fill='${c}' fill-opacity='0.1'/>
      <line x1='0' y1='5' x2='10' y2='5' stroke='${c}' stroke-width='1' stroke-opacity='0.6'/>
      <line x1='5' y1='0' x2='5' y2='10' stroke='${c}' stroke-width='1' stroke-opacity='0.6'/>
    </svg>`;
  }
  return svg ? 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg) : null;
}

// ═══════════════════════════════════════════
// FIPS UTILITIES
// ═══════════════════════════════════════════
function fipsForCounty(stateAbbr, countyName) {
  const stateFips = STATE_FIPS[stateAbbr.toUpperCase()];
  if (!stateFips) return null;
  // Find in loaded data
  for (const [fips, feat] of Object.entries(countyFeatures)) {
    if (fips.startsWith(stateFips)) {
      const name = feat.properties.NAME || '';
      if (name.toLowerCase() === countyName.toLowerCase()) return fips;
    }
  }
  return null;
}

function getAdjacentFips(targetFips) {
  // Get bounding box of target, find counties that share an edge
  const target = countyFeatures[targetFips];
  if (!target) return [];
  const targetBounds = getBounds(target);
  const adjacent = [];

  for (const [fips, feat] of Object.entries(countyFeatures)) {
    if (fips === targetFips) continue;
    if (fips.slice(0,2) !== targetFips.slice(0,2)) continue; // same state only for buffer
    const b = getBounds(feat);
    // Simple proximity check — overlapping bounding boxes with small epsilon
    const eps = 0.05;
    if (b.maxLng >= targetBounds.minLng - eps &&
        b.minLng <= targetBounds.maxLng + eps &&
        b.maxLat >= targetBounds.minLat - eps &&
        b.minLat <= targetBounds.maxLat + eps) {
      adjacent.push(fips);
    }
  }
  return adjacent;
}

function getBounds(feature) {
  let minLat=90, maxLat=-90, minLng=180, maxLng=-180;
  const coords = flatCoords(feature.geometry);
  for (const [lng, lat] of coords) {
    if (lat < minLat) minLat = lat;
    if (lat > maxLat) maxLat = lat;
    if (lng < minLng) minLng = lng;
    if (lng > maxLng) maxLng = lng;
  }
  return { minLat, maxLat, minLng, maxLng };
}

function flatCoords(geometry) {
  const out = [];
  function walk(arr, depth) {
    if (depth === 0) { out.push(arr); return; }
    for (const item of arr) walk(item, depth - 1);
  }
  if (geometry.type === 'Polygon') walk(geometry.coordinates, 2);
  else if (geometry.type === 'MultiPolygon') walk(geometry.coordinates, 3);
  return out;
}

function isOnStateBorder(targetFips, allFips) {
  // Check if any adjacent county in a DIFFERENT state is within proximity
  const target = countyFeatures[targetFips];
  if (!target) return false;
  const targetBounds = getBounds(target);
  const targetState = targetFips.slice(0, 2);
  const eps = 0.05;

  for (const [fips, feat] of Object.entries(countyFeatures)) {
    if (fips.slice(0,2) === targetState) continue; // skip same state
    const b = getBounds(feat);
    if (b.maxLng >= targetBounds.minLng - eps &&
        b.minLng <= targetBounds.maxLng + eps &&
        b.maxLat >= targetBounds.minLat - eps &&
        b.minLat <= targetBounds.maxLat + eps) {
      return true;
    }
  }
  return false;
}

// ═══════════════════════════════════════════
// COVERAGE HEURISTIC
// If selected counties cover > 60% of a state's
// counties, display the whole state.
// ═══════════════════════════════════════════
function shouldShowWholeState(stateFips, selectedFipsInState) {
  const allInState = Object.keys(countyFeatures).filter(f => f.startsWith(stateFips));
  return selectedFipsInState.length / allInState.length >= 0.6;
}

// ═══════════════════════════════════════════
// STYLE HELPERS
// ═══════════════════════════════════════════
function getCountyStyle(countyDef) {
  if (!countyDef || !countyDef.finders || countyDef.finders.length === 0) {
    return { fillColor: '#ffffff', fillOpacity: 0.08, strokeColor: '#ffffff', strokeOpacity: 0.15, strokeWeight: 0.5 };
  }
  // Primary finder = first new find, else first finder
  const primary = countyDef.finders.find(f => f.status === 'new') || countyDef.finders[0];
  const color = primary.color || '#e8a838';
  const pattern = primary.pattern || 'solid';

  return {
    fillColor: color,
    fillOpacity: pattern === 'solid' ? 0.45 : 0.2,
    strokeColor: color,
    strokeOpacity: 0.9,
    strokeWeight: 1.5
  };
}

function getBufferStyle() {
  return {
    fillColor: '#ffffff',
    fillOpacity: 0.04,
    strokeColor: '#ffffff',
    strokeOpacity: 0.1,
    strokeWeight: 0.5
  };
}

// ═══════════════════════════════════════════
// MAP RENDERING
// ═══════════════════════════════════════════
function renderMap(data) {
  // Build lookup keyed by "STATE:County"
  const countyLookup = {};
  for (const c of data.counties) {
    countyLookup[`${c.state.toUpperCase()}:${c.county.toLowerCase()}`] = c;
  }

  // Resolve FIPS for each selected county
  const selectedFips = new Set();
  const fipsToCountyDef = {};

  for (const c of data.counties) {
    const fips = fipsForCounty(c.state, c.county);
    if (fips) {
      selectedFips.add(fips);
      fipsToCountyDef[fips] = c;
      c._fips = fips;
    } else {
      console.warn(`County not found: ${c.county}, ${c.state}`);
    }
  }

  // Determine buffer and whole-state fips
  const bufferFips = new Set();
  const wholeStateFips = new Set();

  // Group selected by state
  const byState = {};
  for (const fips of selectedFips) {
    const s = fips.slice(0,2);
    if (!byState[s]) byState[s] = [];
    byState[s].push(fips);
  }

  for (const [stateFips, stateCodes] of Object.entries(byState)) {
    if (shouldShowWholeState(stateFips, stateCodes)) {
      // Add all counties in state
      for (const fips of Object.keys(countyFeatures)) {
        if (fips.startsWith(stateFips)) wholeStateFips.add(fips);
      }
    } else {
      // Add buffer counties
      for (const fips of stateCodes) {
        if (!isOnStateBorder(fips, [...selectedFips])) {
          const adj = getAdjacentFips(fips);
          for (const a of adj) {
            if (!selectedFips.has(a)) bufferFips.add(a);
          }
        }
      }
    }
  }

  const allVisible = new Set([...selectedFips, ...bufferFips, ...wholeStateFips]);

  // Clear existing
  map.data.forEach(f => map.data.remove(f));
  countyPolygons = {};

  // Fit bounds
  const bounds = new google.maps.LatLngBounds();

  for (const fips of allVisible) {
    const feat = countyFeatures[fips];
    if (!feat) continue;

    const gFeat = map.data.addGeoJson(feat)[0];
    countyPolygons[fips] = gFeat;

    const b = getBounds(feat);
    if (selectedFips.has(fips)) {
      bounds.extend({ lat: b.minLat, lng: b.minLng });
      bounds.extend({ lat: b.maxLat, lng: b.maxLng });
    }
  }

  // Style
  map.data.setStyle(feature => {
    const fips = feature.getProperty('GEO_ID')?.slice(-5) || feature.getId();
    if (selectedFips.has(fips)) {
      return getCountyStyle(fipsToCountyDef[fips]);
    }
    return getBufferStyle();
  });

  map.fitBounds(bounds, { top: 40, bottom: 40, left: 40, right: 320 });

  // Sidebar
  buildSidebar(data, fipsToCountyDef);
  buildLegend(data);

  // Click handler
  map.data.addListener('click', event => {
    const fips = event.feature.getProperty('GEO_ID')?.slice(-5);
    if (!fips || !selectedFips.has(fips)) return;
    const def = fipsToCountyDef[fips];
    if (def) highlightCounty(def, fips);
  });

  document.getElementById('statusPill').textContent =
    `${data.counties.length} counties · ${bufferFips.size} buffer`;
  document.getElementById('statusPill').classList.add('loaded');
}

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function buildSidebar(data, fipsToCountyDef) {
  const list = document.getElementById('countyList');
  list.innerHTML = '';

  for (const c of data.counties) {
    const item = document.createElement('div');
    item.className = 'county-item';
    item.dataset.fips = c._fips || '';

    const name = document.createElement('div');
    name.className = 'county-name';
    name.textContent = c.county;

    const state = document.createElement('div');
    state.className = 'county-state';
    state.textContent = c.state;

    const chips = document.createElement('div');
    chips.className = 'finder-chips';

    for (const f of c.finders) {
      const chip = document.createElement('span');
      chip.className = `finder-chip ${f.status === 'new' ? 'new-find' : ''}`;
      chip.textContent = f.name;
      chip.style.color = f.color;
      chip.style.borderColor = f.color + '88';
      chip.style.background = f.color + '11';
      chips.appendChild(chip);
    }

    item.appendChild(name);
    item.appendChild(state);
    item.appendChild(chips);
    list.appendChild(item);

    item.addEventListener('click', () => highlightCounty(c, c._fips));
  }
}

function buildLegend(data) {
  const allFinders = {};
  for (const c of data.counties) {
    for (const f of c.finders) {
      const key = f.name;
      if (!allFinders[key]) allFinders[key] = f;
    }
  }

  const legend = document.getElementById('legend');
  legend.innerHTML = '';

  for (const f of Object.values(allFinders)) {
    const row = document.createElement('div');
    row.className = 'legend-row';

    const swatch = document.createElement('div');
    swatch.className = 'legend-swatch';
    swatch.style.background = f.color;
    swatch.style.opacity = f.pattern === 'solid' ? '1' : '0.4';
    if (f.pattern !== 'solid') {
      swatch.style.backgroundImage = `repeating-linear-gradient(45deg, ${f.color} 0, ${f.color} 1px, transparent 0, transparent 50%)`;
      swatch.style.backgroundSize = '6px 6px';
    }

    const label = document.createElement('span');
    label.textContent = `${f.name} ${f.status === 'new' ? '★' : '◇'}`;

    row.appendChild(swatch);
    row.appendChild(label);
    legend.appendChild(row);
  }
}

function highlightCounty(def, fips) {
  // Deactivate previous
  document.querySelectorAll('.county-item.active').forEach(el => el.classList.remove('active'));

  // Activate sidebar item
  const item = document.querySelector(`.county-item[data-fips="${fips}"]`);
  if (item) {
    item.classList.add('active');
    item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Info box
  const box = document.getElementById('infoBox');
  const finderLines = def.finders.map(f =>
    `<span style="color:${f.color}">${f.name}</span> — ${f.status} · ${f.pattern}`
  ).join('<br>');
  box.innerHTML = `<strong style="color:var(--text)">${def.county} County, ${def.state}</strong><br><br>${finderLines}`;

  // Pan to county
  if (countyFeatures[fips]) {
    const b = getBounds(countyFeatures[fips]);
    map.panTo({ lat: (b.minLat + b.maxLat) / 2, lng: (b.minLng + b.maxLng) / 2 });
  }
}

// ═══════════════════════════════════════════
// GOOGLE MAPS INIT
// ═══════════════════════════════════════════
async function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    zoom: 6,
    center: { lat: 31.0, lng: -99.0 },
    mapTypeId: 'roadmap',
    styles: darkMapStyles(),
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.LEFT_BOTTOM }
  });

  try {
    // Load GeoJSON county boundaries
    document.getElementById('statusPill').textContent = 'Loading counties…';
    const resp = await fetch(COUNTY_GEOJSON_URL);
    const geojson = await resp.json();

    // Index by 5-digit FIPS
    for (const feat of geojson.features) {
      const fips = feat.id || feat.properties.GEO_ID?.slice(-5);
      if (fips) countyFeatures[fips] = feat;
    }

    // Load map data (embedded or URL)
    const data = await loadMapData();
    renderMap(data);

  } catch(e) {
    console.error(e);
    document.getElementById('statusPill').textContent = 'Error';
    document.getElementById('infoBox').textContent = 'Failed to load county data: ' + e.message;
  }
}

// ═══════════════════════════════════════════
// DARK MAP STYLES
// ═══════════════════════════════════════════
function darkMapStyles() {
  return [
    { elementType: 'geometry', stylers: [{ color: '#1a1d27' }] },
    { elementType: 'labels.text.stroke', stylers: [{ color: '#1a1d27' }] },
    { elementType: 'labels.text.fill', stylers: [{ color: '#6b6f80' }] },
    { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2a2d3a' }] },
    { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#0f1117' }] },
    { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#3a3d4a' }] },
    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0d1520' }] },
    { featureType: 'water', elementType: 'labels.text.fill', stylers: [{ color: '#3d4a5e' }] },
    { featureType: 'poi', stylers: [{ visibility: 'off' }] },
    { featureType: 'transit', stylers: [{ visibility: 'off' }] },
    { featureType: 'administrative.country', elementType: 'geometry.stroke', stylers: [{ color: '#4a4d5a' }] },
    { featureType: 'administrative.province', elementType: 'geometry.stroke', stylers: [{ color: '#3a3d4a' }] },
    { featureType: 'administrative.locality', elementType: 'labels.text.fill', stylers: [{ color: '#4a4d5a' }] },
  ];
}

// ═══════════════════════════════════════════
// BOOTSTRAP GOOGLE MAPS
// ═══════════════════════════════════════════
window.initMap = initMap;
</script>

  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDUocvfkOfu3yJ-ptPxMbwz-AddHmHDyzg&callback=initMap">
