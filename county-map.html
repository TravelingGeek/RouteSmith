<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>County Map — Routesmith POC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #f8f7f4;
      --surface:   #ffffff;
      --border:    #e0ddd8;
      --border2:   #c8c4be;
      --accent:    #5D3FD3;
      --text:      #1a1814;
      --muted:     #7a7570;
      --font-ui:   'DM Mono', 'Courier New', monospace;
      --font-body: 'Inter', system-ui, sans-serif;
    }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { display: flex; align-items: center; gap: 12px; padding: 10px 18px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .rs-mark { font-family: var(--font-ui); font-size: 13px; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
    .rs-divider { width: 1px; height: 18px; background: var(--border); }
    header h1 { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; }
    .status-pill { margin-left: auto; font-family: var(--font-ui); font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--border); color: var(--muted); }
    .status-pill.loaded { color: var(--accent); border: 1px solid var(--accent); background: #5D3FD310; }
    .main { display: flex; flex: 1; overflow: hidden; }
    #map { flex: 1; height: 100%; }
    .panel { width: 288px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; flex-shrink: 0; transition: background 0.12s; }
    .section-header:hover { background: var(--bg); }
    .section-header .panel-label { margin-bottom: 0; }
    .section-chevron { font-size: 9px; color: var(--muted); transition: transform 0.2s; display: inline-block; }
    .section-chevron.open { transform: rotate(180deg); }
    .section-body { border-bottom: 1px solid var(--border); overflow: hidden; transition: max-height 0.25s ease, padding 0.25s ease; }
    .section-body.open { max-height: 600px; padding: 12px 16px; }
    .section-body.closed { max-height: 0; padding: 0 16px; }
    .panel-label { font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 9px; }
    .viz-toggle { display: flex; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; overflow: hidden; }
    .viz-toggle button { flex: 1; padding: 7px 0; border: none; background: transparent; font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.06em; color: var(--muted); cursor: pointer; transition: background 0.15s, color 0.15s; border-right: 1px solid var(--border2); }
    .viz-toggle button:last-child { border-right: none; }
    .viz-toggle button:hover { background: var(--border); color: var(--text); }
    .viz-toggle button.active { background: var(--accent); color: #fff; font-weight: 600; }
    .status-legend { display: flex; flex-direction: column; gap: 6px; }
    .status-legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
    .status-swatch { width: 20px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.15); flex-shrink: 0; }
    .finder-legend { display: flex; flex-direction: column; gap: 5px; }
    .finder-legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
    .finder-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.15); }
    .county-list { overflow-y: auto; }
    .county-list.open { max-height: 9999px; }
    .county-list.closed { max-height: 0; overflow: hidden; }
    .counties-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; flex-shrink: 0; transition: background 0.12s; }
    .counties-header:hover { background: var(--bg); }
    .counties-header .panel-label { margin-bottom: 0; }
    .county-item { padding: 7px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
    .county-item:hover { background: var(--bg); }
    .county-item.active { background: #5D3FD308; border-left: 2px solid var(--accent); padding-left: 14px; }
    .county-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .county-state { font-family: var(--font-ui); font-size: 10px; color: var(--muted); margin-top: 1px; }
    .finder-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .finder-chip { font-size: 10px; padding: 2px 7px; border-radius: 3px; font-family: var(--font-ui); border: 1px solid currentColor; }
    .finder-chip.new-find { font-weight: 700; }
    .info-box { padding: 13px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); line-height: 1.65; flex-shrink: 0; }
    .url-source { font-family: var(--font-ui); font-size: 10px; color: var(--accent); word-break: break-all; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>

<div class="main">

  <aside class="panel">

        <div class="viz-toggle">
          <button id="btnRoad" class="active" onclick="event.stopPropagation();setBaseMap('road')">Road</button>

      <div class="status-legend">
        <div class="status-legend-row"><div class="status-swatch" style="background:#5D3FD3"></div><span>All new this trip</span></div>

        <div class="status-legend-row"><div class="status-swatch" style="background:#b0aaa4"></div><span>All previous, none new</span></div>
        <div class="status-legend-row"><div class="status-swatch" style="background:#dedad6"></div><span>Some previous, none new</span></div>

<script>
const COUNTY_GEOJSON_URL = 'https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json';
const STATUS_COLORS = { 'all-new':'#5D3FD3','some-new':'#CF9FFF','all-prev':'#b0aaa4','some-prev':'#dedad6','never':null };
const STATE_FIPS = {
  AL:'01',AK:'02',AZ:'04',AR:'05',CA:'06',CO:'08',CT:'09',DE:'10',FL:'12',GA:'13',
  HI:'15',ID:'16',IL:'17',IN:'18',IA:'19',KS:'20',KY:'21',LA:'22',ME:'23',MD:'24',
  MA:'25',MI:'26',MN:'27',MS:'28',MO:'29',MT:'30',NE:'31',NV:'32',NH:'33',NJ:'34',
  NM:'35',NY:'36',NC:'37',ND:'38',OH:'39',OK:'40',OR:'41',PA:'42',RI:'44',SC:'45',
  SD:'46',TN:'47',TX:'48',UT:'49',VT:'50',VA:'51',WA:'53',WV:'54',WI:'55',WY:'56',DC:'11'
};

let map, mapData, clickInfoWindow = null;
let countyFeatures = {}, countyOverlays = {}, staticOverlays = [];
let currentVizMode = 'E';
let currentSelectedFips = new Set(), currentFipsToCountyDef = {};
// ── SECTION COLLAPSE ──
function toggleSection(id) {
  const body = id === 'cnty' ? document.getElementById('countyList') : document.getElementById('body-'+id);
  const chev = document.getElementById('chev-'+id);
  if (!body||!chev) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  body.classList.toggle('closed',isOpen);
  chev.classList.toggle('open',!isOpen);
}

// ── STATUS ──
function countyStatus(def) {
  if (!def||!def.finders||!def.finders.length) return 'never';
  const hasNew=def.finders.some(f=>f.status==='new');
  const hasPrev=def.finders.some(f=>f.status==='previous');
  if (def.finders.every(f=>f.status==='new'))  return 'all-new';
  if (hasNew)  return 'some-new';
  if (def.finders.every(f=>f.status==='previous')) return 'all-prev';
  if (hasPrev) return 'some-prev';
  return 'never';
}
function statusFillColor(def) { return STATUS_COLORS[countyStatus(def)]||null; }

// ── DATA LOADING ──
async function loadMapData() {
  const params=new URLSearchParams(window.location.search), dataUrl=params.get('data');
  if (dataUrl) {
    document.getElementById('dataSourceDisplay').textContent=dataUrl;
    try { const r=await fetch(dataUrl); if(!r.ok) throw new Error(); return await r.json(); }
    catch(e) { document.getElementById('dataSourceDisplay').textContent='embedded JSON (fallback)'; }
  }
  return JSON.parse(document.getElementById('mapData').textContent);
}

// ── GEO UTILITIES ──
function fipsForCounty(stateAbbr, countyName) {
  const sf=STATE_FIPS[stateAbbr.toUpperCase()]; if(!sf) return null;
  for(const [fips,feat] of Object.entries(countyFeatures))
    if(fips.startsWith(sf)&&(feat.properties.NAME||'').toLowerCase()===countyName.toLowerCase()) return fips;
  return null;
}

function getBounds(feature) {
  let minLat=90,maxLat=-90,minLng=180,maxLng=-180;
  for(const [lng,lat] of flatCoords(feature.geometry)){
    if(lat<minLat)minLat=lat;if(lat>maxLat)maxLat=lat;
    if(lng<minLng)minLng=lng;if(lng>maxLng)maxLng=lng;
  }
  return {minLat,maxLat,minLng,maxLng};
}

function flatCoords(geometry) {
  const out=[];
  function walk(arr,d){if(d===0){out.push(arr);return;}for(const i of arr)walk(i,d-1);}
  if(geometry.type==='Polygon') walk(geometry.coordinates,2);
  else if(geometry.type==='MultiPolygon') walk(geometry.coordinates,3);
  return out;
}

function featureToGooglePaths(feature) {
  const paths=[], toPath=ring=>ring.map(([lng,lat])=>({lat,lng}));
  if(feature.geometry.type==='Polygon') for(const r of feature.geometry.coordinates) paths.push(toPath(r));
  else if(feature.geometry.type==='MultiPolygon') for(const p of feature.geometry.coordinates) for(const r of p) paths.push(toPath(r));
  return paths;
}

// Get all rings as arrays of [lng,lat]
function getAllRings(feature) {
  const rings=[];
  if(feature.geometry.type==='Polygon') rings.push(...feature.geometry.coordinates);
  else if(feature.geometry.type==='MultiPolygon') for(const p of feature.geometry.coordinates) rings.push(...p);
  return rings;
}

// Polygon centroid (shoelace) on largest ring
function visualCentroid(feature) {
  let bestRing=null, bestArea=0;
  for(const ring of getAllRings(feature)){
    let area=0;
    for(let i=0,j=ring.length-1;i<ring.length;j=i++){
      area+=(ring[j][0]+ring[i][0])*(ring[j][1]-ring[i][1]);
    }
    area=Math.abs(area)/2;
    if(area>bestArea){bestArea=area;bestRing=ring;}
  }
  if(!bestRing) return {lat:0,lng:0};
  let cx=0,cy=0,a=0;
  for(let i=0,j=bestRing.length-1;i<bestRing.length;j=i++){
    const cross=bestRing[j][0]*bestRing[i][1]-bestRing[i][0]*bestRing[j][1];
    cx+=(bestRing[j][0]+bestRing[i][0])*cross;
    cy+=(bestRing[j][1]+bestRing[i][1])*cross;
    a+=cross;
  }
  a*=3;
  if(Math.abs(a)<1e-10){
    const lngs=bestRing.map(p=>p[0]),lats=bestRing.map(p=>p[1]);
    return {lat:(Math.min(...lats)+Math.max(...lats))/2,lng:(Math.min(...lngs)+Math.max(...lngs))/2};
  }
  return {lat:cy/a,lng:cx/a};
}

function outerRingPoints(feature) {
  const ring=feature.geometry.type==='Polygon'?feature.geometry.coordinates[0]:feature.geometry.coordinates[0][0];
  return ring.map(([lng,lat])=>({lat,lng}));
}

function perimeter(pts) {
  let d=0;
  for(let i=1;i<pts.length;i++) d+=Math.sqrt(Math.pow(pts[i].lat-pts[i-1].lat,2)+Math.pow(pts[i].lng-pts[i-1].lng,2));
  return d;
}

function splitPerimeterArcs(pts,n) {
  const total=perimeter(pts),seg=total/n;
  const arcs=[];
  let cur=[pts[0]],acc=0,idx=0;
  for(let i=1;i<pts.length&&idx<n-1;i++){
    const d=Math.sqrt(Math.pow(pts[i].lat-pts[i-1].lat,2)+Math.pow(pts[i].lng-pts[i-1].lng,2));
    acc+=d; cur.push(pts[i]);
    if(acc>=seg*(idx+1)){arcs.push(cur);cur=[pts[i]];idx++;}
  }
  const li=cur.length>0?pts.indexOf(cur[cur.length-1])+1:1;
  for(let i=li;i<pts.length;i++) cur.push(pts[i]);
  arcs.push(cur);
  return arcs;
}

function shrinkPathsToCentroid(paths, factor) {
  let sumLat=0,sumLng=0,cnt=0;
  for(const ring of paths) for(const p of ring){sumLat+=p.lat;sumLng+=p.lng;cnt++;}
  const cx=sumLat/cnt,cy=sumLng/cnt;
  return paths.map(ring=>ring.map(p=>({lat:cx+(p.lat-cx)*(1-factor),lng:cy+(p.lng-cy)*(1-factor)})));
}

function getAdjacentFips(targetFips) {
  const tb=getBounds(countyFeatures[targetFips]),eps=0.05;
  return Object.entries(countyFeatures)
    .filter(([fips,feat])=>{
      if(fips===targetFips||fips.slice(0,2)!==targetFips.slice(0,2)) return false;
      const b=getBounds(feat);
      return b.maxLng>=tb.minLng-eps&&b.minLng<=tb.maxLng+eps&&b.maxLat>=tb.minLat-eps&&b.minLat<=tb.maxLat+eps;
    }).map(([f])=>f);
}

function isOnStateBorder(targetFips) {
  const tb=getBounds(countyFeatures[targetFips]),ts=targetFips.slice(0,2),eps=0.05;
  return Object.entries(countyFeatures).some(([fips,feat])=>{
    if(fips.slice(0,2)===ts) return false;
    const b=getBounds(feat);
    return b.maxLng>=tb.minLng-eps&&b.minLng<=tb.maxLng+eps&&b.maxLat>=tb.minLat-eps&&b.minLat<=tb.maxLat+eps;
  });
}

function shouldShowWholeState(stateFips,selected) {
  const all=Object.keys(countyFeatures).filter(f=>f.startsWith(stateFips));
  return all.length>0&&selected.length/all.length>=0.6;
}

// ── CLICK POPUP ──
function showClickPopup(fips, def, latLng) {
  if (clickInfoWindow) { clickInfoWindow.close(); clickInfoWindow = null; }
  const feat = countyFeatures[fips]; if(!feat) return;
  const countyName = feat.properties.NAME||'';
  const stateAbbr = Object.entries(STATE_FIPS).find(([,v])=>v===fips.slice(0,2))?.[0]||'';

  let html = `<div style="font-family:'Inter',sans-serif;font-size:12px;line-height:1.6;padding:2px 2px 2px 0;min-width:130px">`;
  html += `<div style="font-weight:600;color:#1a1814;margin-bottom:5px">${countyName} County, ${stateAbbr}</div>`;

  if (def && def.finders && def.finders.length > 0) {
    const newF  = def.finders.filter(f=>f.status==='new');
    const prevF = def.finders.filter(f=>f.status==='previous');
    if (newF.length) {
      html += `<div style="font-size:10px;color:#7a7570;margin-bottom:3px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em">Found this trip</div>`;
      for (const f of newF)
        html += `<div style="font-size:11px;display:flex;align-items:center;gap:5px;margin-bottom:1px"><span style="width:8px;height:8px;border-radius:50%;background:${f.color};display:inline-block;flex-shrink:0"></span>${f.name}</div>`;
    }
    if (prevF.length) {
      html += `<div style="font-size:10px;color:#7a7570;margin-top:${newF.length?'6px':'0'};margin-bottom:3px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em">Previously found</div>`;
      for (const f of prevF)
        html += `<div style="font-size:11px;display:flex;align-items:center;gap:5px;margin-bottom:1px"><span style="width:8px;height:8px;border-radius:50%;background:${f.color};display:inline-block;flex-shrink:0"></span>${f.name}</div>`;
    }
  } else {
    html += `<div style="font-size:11px;color:#7a7570">Never found</div>`;
  }
  html += '</div>';

  clickInfoWindow = new google.maps.InfoWindow({ content: html, position: latLng, disableAutoPan: true });
  clickInfoWindow.open(map);
}

// ── OVERLAY MANAGEMENT ──
function clearDynamicOverlays() {
  for(const arr of Object.values(countyOverlays)) for(const o of arr) o.setMap(null);
  countyOverlays={};
}
function clearStaticOverlays() {
  for(const o of staticOverlays) o.setMap(null);
  staticOverlays=[];
}

function countyBorderPoly(paths, weight, opacity, zIndex) {
  return new google.maps.Polygon({
    paths, map, fillOpacity:0,
    strokeColor:'#222', strokeOpacity:opacity, strokeWeight:weight,
    clickable:false, zIndex
  });
}

// ── MODE B ──
function renderModeB(fips, def) {
  const feat=countyFeatures[fips]; if(!feat) return;
  const overlays=[], paths=featureToGooglePaths(feat), fillColor=statusFillColor(def);
  overlays.push(new google.maps.Polygon({
    paths, map, fillColor:fillColor||'#ffffff', fillOpacity:fillColor?0.4:0,
    strokeOpacity:0, strokeWeight:0, clickable:false
  }));
  if (def&&def.finders.length>0) {
    const pts=outerRingPoints(feat), arcs=splitPerimeterArcs(pts,def.finders.length);
    def.finders.forEach((f,i)=>{
      if(!arcs[i]||arcs[i].length<2) return;
      overlays.push(new google.maps.Polyline({path:arcs[i],map,strokeColor:'#ffffff',strokeOpacity:0.6,strokeWeight:10,clickable:false}));
      overlays.push(new google.maps.Polyline({path:arcs[i],map,strokeColor:f.color,strokeOpacity:1.0,strokeWeight:7,clickable:false}));
    });
  }
  overlays.push(countyBorderPoly(paths,1.5,0.7,5));
  countyOverlays[fips]=overlays;
}

// ── MODE D ──
function renderModeD(fips, def) {
  const feat=countyFeatures[fips]; if(!feat) return;
  const overlays=[], finders=(def&&def.finders)||[], n=finders.length;
  const basePaths=featureToGooglePaths(feat), fillColor=statusFillColor(def);

  // Base status fill — same opacity as other modes
  overlays.push(new google.maps.Polygon({
    paths:basePaths, map,
    fillColor:fillColor||'#ffffff', fillOpacity:fillColor?0.4:0,
    strokeOpacity:0, strokeWeight:0, clickable:false, zIndex:1
  }));

  if (n>0) {
    const SHRINK_STEP=0.20;
    const reversed=[...finders].reverse();
    reversed.forEach((f,i)=>{
      const outerPaths=shrinkPathsToCentroid(basePaths, i*SHRINK_STEP);
      const innerPaths=shrinkPathsToCentroid(basePaths, (i+1)*SHRINK_STEP);
      // Fill the outer shape with finder color
      overlays.push(new google.maps.Polygon({
        paths:outerPaths, map,
        fillColor:f.color, fillOpacity:0.4,
        strokeColor:f.color, strokeOpacity:0.6, strokeWeight:1,
        clickable:false, zIndex:2+i
      }));
      // Paint the inner area back with status fill to create the ring effect
      overlays.push(new google.maps.Polygon({
        paths:innerPaths, map,
        fillColor:fillColor||'#f5f3ef', fillOpacity:1.0,
        strokeOpacity:0, strokeWeight:0,
        clickable:false, zIndex:3+i
      }));
    });
  }

  overlays.push(countyBorderPoly(basePaths,1.5,0.7,20));
  countyOverlays[fips]=overlays;
}

// ── MODE E ──
function renderModeE(fips, def) {
  const feat=countyFeatures[fips]; if(!feat) return;
  const overlays=[], paths=featureToGooglePaths(feat), fillColor=statusFillColor(def);
  overlays.push(new google.maps.Polygon({
    paths, map, fillColor:fillColor||'#ffffff', fillOpacity:fillColor?0.4:0,
    strokeOpacity:0, strokeWeight:0, clickable:false
  }));
  overlays.push(countyBorderPoly(paths,1.5,0.7,5));
  if (def&&def.finders.length>0) {
    const center=visualCentroid(feat), finders=def.finders;
    const DOT_SPACING=0.10, totalWidth=(finders.length-1)*DOT_SPACING;
    const startLng=center.lng-totalWidth/2;
    finders.forEach((f,i)=>{
      overlays.push(new google.maps.Marker({
        position:{lat:center.lat,lng:startLng+i*DOT_SPACING}, map,
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:f.color,fillOpacity:1,strokeColor:'#ffffff',strokeWeight:2},
        title:`${f.name} (${f.status})`, clickable:false
      }));
    });
  }
  countyOverlays[fips]=overlays;
}

// ── STATIC OVERLAYS ──
function buildStaticOverlays(allVisibleFips, selectedFips) {
  clearStaticOverlays();

  // All unfound county outlines
  for (const fips of allVisibleFips) {
    if (selectedFips.has(fips)) continue;
    const feat=countyFeatures[fips]; if(!feat) continue;
    const paths=featureToGooglePaths(feat);
    const poly=new google.maps.Polygon({
      paths, map, fillColor:'#888', fillOpacity:0.04,
      strokeColor:'#555', strokeOpacity:0.45, strokeWeight:1.0,
      clickable:true, zIndex:1
    });
    poly.addListener('click', e => { showClickPopup(fips, null, e.latLng); });
    staticOverlays.push(poly);
  }

}

// ── VIZ MODE SWITCH ──
let topoOverlay = null;

function setBaseMap(mode) {
  ['btnRoad','btnTerrain','btnTopo'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  document.getElementById('btn' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');

  // Remove topo overlay if switching away
  map.overlayMapTypes.clear();
  topoOverlay = null;

  if (mode === 'road') {
    map.setMapTypeId('roadmap');
    map.setOptions({ styles: lightMapStyles() });
  } else if (mode === 'terrain') {
    map.setMapTypeId('terrain');
    map.setOptions({ styles: terrainMapStyles() });
  } else if (mode === 'topo') {
    map.setMapTypeId('roadmap');
    map.setOptions({ styles: topoBaseStyles() });
    // Overlay USGS National Map topo tiles
    topoOverlay = new google.maps.ImageMapType({
      getTileUrl: (coord, zoom) =>
        `https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/${zoom}/${coord.y}/${coord.x}`,
      tileSize: new google.maps.Size(256, 256),
      maxZoom: 16,
      minZoom: 0,
      name: 'USGS Topo',
      opacity: 1.0
    });
    map.overlayMapTypes.push(topoOverlay);
  }
}

function setVizMode(mode) {
  currentVizMode=mode;
  ['B','D','E'].forEach(m=>document.getElementById(`btn${m}`).classList.toggle('active',m===mode));
  clearDynamicOverlays();
  applyVizMode();
  addHitPolygons();
}

function applyVizMode() {
  for (const fips of currentSelectedFips) {
    const def=currentFipsToCountyDef[fips];
    if(currentVizMode==='B') renderModeB(fips,def);
    else if(currentVizMode==='D') renderModeD(fips,def);
    else renderModeE(fips,def);
  }
}

function addHitPolygons() {
  for (const fips of currentSelectedFips) {
    const feat=countyFeatures[fips]; if(!feat) continue;
    const def=currentFipsToCountyDef[fips];
    const paths=featureToGooglePaths(feat);
    const hit=new google.maps.Polygon({
      paths, map, fillColor:'#000', fillOpacity:0.001,
      strokeOpacity:0, strokeWeight:0, clickable:true, zIndex:30
    });
    hit.addListener('click', e => {
      showClickPopup(fips, def, e.latLng);
      highlightCounty(def, fips);
    });
    if(!countyOverlays[fips]) countyOverlays[fips]=[];
    countyOverlays[fips].push(hit);
  }
}

// ── MAIN RENDER ──
function renderMap(data) {
  const selectedFips=new Set(), fipsToCountyDef={};
  for(const c of data.counties){
    const fips=fipsForCounty(c.state,c.county);
    if(fips){selectedFips.add(fips);fipsToCountyDef[fips]=c;c._fips=fips;}
    else console.warn(`County not found: ${c.county}, ${c.state}`);
  }

  const bufferFips=new Set(),wholeStateFips=new Set(),byState={};
  for(const fips of selectedFips){const s=fips.slice(0,2);if(!byState[s])byState[s]=[];byState[s].push(fips);}
  for(const [stateFips,codes] of Object.entries(byState)){
    if(shouldShowWholeState(stateFips,codes)){
      for(const fips of Object.keys(countyFeatures)) if(fips.startsWith(stateFips)) wholeStateFips.add(fips);
    } else {
      for(const fips of codes)
        if(!isOnStateBorder(fips))
          for(const a of getAdjacentFips(fips))
            if(!selectedFips.has(a)) bufferFips.add(a);
    }
  }

  currentSelectedFips=selectedFips;
  currentFipsToCountyDef=fipsToCountyDef;
  clearDynamicOverlays();
  clearStaticOverlays();

  const allVisibleFips=new Set([...selectedFips,...bufferFips,...wholeStateFips]);

  // Fit bounds to all visible counties
  const bounds=new google.maps.LatLngBounds();
  for(const fips of allVisibleFips){
    const feat=countyFeatures[fips]; if(!feat) continue;
    const b=getBounds(feat);
    bounds.extend({lat:b.minLat,lng:b.minLng});
    bounds.extend({lat:b.maxLat,lng:b.maxLng});
  }

  buildStaticOverlays(allVisibleFips,selectedFips);
  applyVizMode();
  addHitPolygons();
  map.fitBounds(bounds,{top:40,bottom:40,left:40,right:300});
  buildSidebar(data);
  buildFinderLegend(data);
  document.getElementById('statusPill').textContent=`${data.counties.length} counties · ${bufferFips.size} buffer`;
  document.getElementById('statusPill').classList.add('loaded');
}

// ── SIDEBAR ──
function buildSidebar(data) {
  const list=document.getElementById('countyList'); list.innerHTML='';
  for(const c of data.counties){
    const item=document.createElement('div'); item.className='county-item'; item.dataset.fips=c._fips||'';
    const nameRow=document.createElement('div'); nameRow.style.cssText='display:flex;align-items:center;gap:7px;';
    const fc=statusFillColor(c);
    const dot=document.createElement('div');
    dot.style.cssText=`width:9px;height:9px;border-radius:50%;background:${fc||'transparent'};flex-shrink:0;border:1px solid ${fc?'rgba(0,0,0,0.15)':'#999'};`;
    const name=document.createElement('div'); name.className='county-name'; name.textContent=c.county;
    nameRow.appendChild(dot); nameRow.appendChild(name);
    const state=document.createElement('div'); state.className='county-state'; state.textContent=c.state; state.style.paddingLeft='16px';
    const chips=document.createElement('div'); chips.className='finder-chips'; chips.style.paddingLeft='16px';
    for(const f of c.finders){
      const chip=document.createElement('span');
      chip.className=`finder-chip ${f.status==='new'?'new-find':''}`;
      chip.textContent=f.name+(f.status==='new'?' ★':' ◇');
      chip.style.color=f.color; chip.style.borderColor=f.color+'88'; chip.style.background=f.color+'12';
      chips.appendChild(chip);
    }
    item.appendChild(nameRow); item.appendChild(state); item.appendChild(chips);
    list.appendChild(item);
    item.addEventListener('click',()=>highlightCounty(c,c._fips));
  }
}

function buildFinderLegend(data) {
  const allFinders={};
  for(const c of data.counties) for(const f of c.finders) if(!allFinders[f.name]) allFinders[f.name]=f;
  const legend=document.getElementById('finderLegend'); legend.innerHTML='';
  for(const f of Object.values(allFinders)){
    const row=document.createElement('div'); row.className='finder-legend-row';
    const dot=document.createElement('div'); dot.className='finder-dot'; dot.style.background=f.color;
    const lbl=document.createElement('span'); lbl.textContent=f.name;
    row.appendChild(dot); row.appendChild(lbl); legend.appendChild(row);
  }
}

function highlightCounty(def, fips) {
  document.querySelectorAll('.county-item.active').forEach(el=>el.classList.remove('active'));
  const item=document.querySelector(`.county-item[data-fips="${fips}"]`);
  if(item){
    item.classList.add('active');
    item.scrollIntoView({block:'nearest',behavior:'smooth'});
    // Auto-expand counties section if collapsed
    const list=document.getElementById('countyList');
    if(list.classList.contains('closed')) toggleSection('cnty');
  }
  const labels={'all-new':'All new this trip','some-new':'Some new this trip','all-prev':'All previous, none new','some-prev':'Some previous, none new','never':'Never found'};
  const finderLines=def.finders.map(f=>
    `<span style="color:${f.color};font-weight:${f.status==='new'?'700':'400'}">${f.name}</span> <span style="color:var(--muted);font-size:10px">${f.status==='new'?'★ new':'◇ previous'}</span>`
  ).join('<br>');
  document.getElementById('infoBox').innerHTML=
    `<strong style="color:var(--text)">${def.county} County, ${def.state}</strong>
     <div style="font-size:10px;font-family:var(--font-ui);color:var(--muted);margin:3px 0 8px">${labels[countyStatus(def)]||''}</div>
     ${finderLines}`;
}

// ── MAP STYLES ──
function lightMapStyles() {
  return [
    {elementType:'geometry',stylers:[{color:'#f5f3ef'}]},
    {elementType:'labels.text.stroke',stylers:[{color:'#f5f3ef'}]},
    {elementType:'labels.text.fill',stylers:[{color:'#6b6560'}]},
    {featureType:'poi',stylers:[{visibility:'off'}]},
    {featureType:'transit',stylers:[{visibility:'off'}]},
    {featureType:'road.local',stylers:[{visibility:'off'}]},
    {featureType:'road.arterial',stylers:[{visibility:'off'}]},
    {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#d4c9b0'}]},
    {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#c4b89a'}]},
    {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#5a5048'}]},
    {featureType:'water',elementType:'geometry',stylers:[{color:'#b8d4e8'}]},
    {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#5a7a99'}]},
    {featureType:'landscape.natural',elementType:'geometry',stylers:[{color:'#eae8e2'}]},
    {featureType:'administrative.country',elementType:'geometry.stroke',stylers:[{color:'#888',visibility:'on'}]},
    {featureType:'administrative.province',elementType:'geometry.stroke',stylers:[{color:'#1a1a1a',visibility:'on'},{weight:4}]},
    {featureType:'administrative.locality',elementType:'labels.text.fill',stylers:[{color:'#4a4440'}]},
    {featureType:'administrative.locality',elementType:'labels.text.stroke',stylers:[{color:'#f5f3ef'}]},
    {featureType:'administrative.neighborhood',stylers:[{visibility:'off'}]},
  ];
}

function topoBaseStyles() {
  // Minimal white base — USGS topo tiles render on top
  return [
    { elementType: 'geometry',           stylers: [{ color: '#ffffff' }] },
    { elementType: 'labels',             stylers: [{ visibility: 'off' }] },
    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#c9e8f5' }] },
    { featureType: 'administrative.province', elementType: 'geometry.stroke', stylers: [{ color: '#1a1a1a', visibility: 'on' }, { weight: 4 }] },
    { featureType: 'administrative.country',  elementType: 'geometry.stroke', stylers: [{ color: '#888', visibility: 'on' }] },
  ];
}

function terrainMapStyles() {
  return [
    {featureType:'poi',                  stylers:[{visibility:'off'}]},
    {featureType:'transit',              stylers:[{visibility:'off'}]},
    {featureType:'road.local',           stylers:[{visibility:'off'}]},
    {featureType:'road.arterial',        stylers:[{visibility:'off'}]},
    {featureType:'road.highway',elementType:'geometry',        stylers:[{color:'#c9b99a'}]},
    {featureType:'road.highway',elementType:'geometry.stroke', stylers:[{color:'#b8a888'}]},
    {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#4a3e30'}]},
    {featureType:'administrative.country', elementType:'geometry.stroke',stylers:[{color:'#888',visibility:'on'}]},
    {featureType:'administrative.province',elementType:'geometry.stroke',stylers:[{color:'#1a1a1a',visibility:'on'},{weight:4}]},
    {featureType:'administrative.locality',elementType:'labels.text.fill',  stylers:[{color:'#3a3020'}]},
    {featureType:'administrative.locality',elementType:'labels.text.stroke',stylers:[{color:'#f0ebe0'}]},
    {featureType:'administrative.neighborhood',stylers:[{visibility:'off'}]},
  ];
}

// ── INIT ──
async function initMap() {
  map=new google.maps.Map(document.getElementById('map'),{
    zoom:6,center:{lat:31.0,lng:-99.0},mapTypeId:'roadmap',styles:lightMapStyles(),
    mapTypeControl:false,streetViewControl:false,fullscreenControl:true,zoomControl:true,
    zoomControlOptions:{position:google.maps.ControlPosition.LEFT_BOTTOM}
  });
  // Close popup when clicking empty map
  map.addListener('click',()=>{ if(clickInfoWindow){clickInfoWindow.close();clickInfoWindow=null;} });
  try {
    document.getElementById('statusPill').textContent='Loading counties…';
    const resp=await fetch(COUNTY_GEOJSON_URL);
    const geojson=await resp.json();
    for(const feat of geojson.features){
      const fips=feat.id||feat.properties.GEO_ID?.slice(-5);
      if(fips) countyFeatures[fips]=feat;
    }
    mapData=await loadMapData();
    renderMap(mapData);
  } catch(e){
    console.error(e);
    document.getElementById('statusPill').textContent='Error';
    document.getElementById('infoBox').textContent='Failed to load: '+e.message;
  }
}
window.initMap=initMap;
</script>
