<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routesmith — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Clerk JS — loads the embedded sign-in component -->
<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_cmVhZHktcmVkYmlyZC01Ni5jbGVyay5hY2NvdW50cy5kZXYk"
  src="https://ready-redbird-56.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
  type="text/javascript"
></script>

<style>
  :root {
    --paper: #fbf5e6;
    --paper-deep: #f5edd6;
    --ink: #1f1810;
    --ink-soft: #4a3f2e;
    --ink-muted: #7a6f5a;
    --brass: #a87832;
    --brass-deep: #7a5621;
    --forge: #2d5a2a;
    --stamp: #a83328;
    --rule: #c9bda0;
    --rule-soft: #ddd2b5;
  }

  * { box-sizing: border-box; }

  html { -webkit-font-smoothing: antialiased; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    background-image:
      linear-gradient(rgba(168, 120, 50, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168, 120, 50, 0.05) 1px, transparent 1px),
      radial-gradient(ellipse at top, rgba(168, 120, 50, 0.08) 0%, transparent 60%);
    background-size: 28px 28px, 28px 28px, 100% 100%;
    color: var(--ink);
    font-family: 'Source Serif 4', Charter, Georgia, serif;
    line-height: 1.6;
    font-size: 17px;
  }

  /* ============================================================ */
  /* Header / nav                                                 */
  /* ============================================================ */
  .site-header {
    max-width: 920px;
    margin: 0 auto;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
  }

  .site-brand-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--brass-deep);
    text-decoration: none;
  }

  .site-nav {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1;
    justify-content: flex-end;
  }

  .nav-modules {
    display: flex;
    align-items: center;
    border: 1px solid var(--rule);
    border-radius: 2px;
    overflow: hidden;
    margin-right: 16px;
  }

  .nav-module {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-muted);
    text-decoration: none;
    padding: 6px 14px;
    border-right: 1px solid var(--rule);
    transition: color 0.15s, background 0.15s;
    white-space: nowrap;
  }

  .nav-module:last-child { border-right: none; }

  .nav-module:hover {
    color: var(--brass-deep);
    background: rgba(168, 120, 50, 0.06);
  }

  .nav-module.disabled {
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* User menu — shown when signed in; hidden until Clerk loads */
  .nav-user {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--brass-deep);
    display: none; /* shown by JS after auth */
    align-items: center;
    gap: 12px;
  }

  .nav-user-name {
    color: var(--ink-soft);
  }

  .nav-signout {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-muted);
    background: none;
    border: 1px solid var(--rule);
    padding: 6px 12px;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .nav-signout:hover {
    color: var(--stamp);
    border-color: var(--stamp);
  }

  .nav-signin-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--paper);
    background: var(--brass-deep);
    text-decoration: none;
    padding: 7px 16px;
    border-radius: 2px;
    transition: background 0.15s;
  }

  .nav-signin-link:hover { background: var(--ink); }

  /* ============================================================ */
  /* Page layout                                                  */
  /* ============================================================ */
  .page {
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }

  /* ============================================================ */
  /* Page header                                                  */
  /* ============================================================ */
  .page-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--brass-deep);
    margin-bottom: 10px;
    text-align: center;
  }

  .page-title {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 60;
    font-weight: 600;
    font-size: 2rem;
    text-align: center;
    margin: 0 0 8px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .page-subtitle {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--ink-soft);
    text-align: center;
    margin: 0 0 40px;
  }

  /* ============================================================ */
  /* Clerk component mount point                                  */
  /* ============================================================ */
  #clerk-sign-in {
    /* Clerk renders its own component here. The appearance object
       below customises it to match the Routesmith design system. */
  }

  /* ============================================================ */
  /* Signed-in state — shown after successful auth                */
  /* ============================================================ */
  .signed-in-panel {
    display: none; /* toggled by JS */
    background: rgba(255, 252, 240, 0.7);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--brass);
    padding: 32px 36px;
    text-align: center;
  }

  .signed-in-greeting {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 60;
    font-weight: 600;
    font-size: 1.5rem;
    color: var(--ink);
    margin: 0 0 8px;
  }

  .signed-in-sub {
    font-size: 0.96rem;
    color: var(--ink-soft);
    margin: 0 0 28px;
  }

  .module-links {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .module-link {
    display: block;
    text-decoration: none;
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 16px 12px;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .module-link:hover {
    border-color: var(--brass);
    background: rgba(168, 120, 50, 0.05);
  }

  .module-link.active:hover {
    border-color: var(--forge);
    background: rgba(45, 90, 42, 0.05);
  }

  .module-link-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--brass-deep);
    margin-bottom: 4px;
  }

  .module-link.active .module-link-num {
    color: var(--forge);
  }

  .module-link-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--ink);
  }

  .module-link-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.64rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    margin-top: 4px;
  }

  .module-link.active .module-link-status {
    color: var(--forge);
  }

  .signout-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-muted);
    background: none;
    border: 1px solid var(--rule);
    padding: 8px 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .signout-btn:hover {
    color: var(--stamp);
    border-color: var(--stamp);
  }

  /* ============================================================ */
  /* Loading state                                                */
  /* ============================================================ */
  .loading {
    text-align: center;
    padding: 48px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-muted);
  }

  /* ============================================================ */
  /* Footer                                                       */
  /* ============================================================ */
  footer {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-muted);
    padding-bottom: 24px;
    margin-top: 48px;
  }

  footer .domain { color: var(--brass-deep); }
  footer .sep { margin: 0 10px; color: var(--rule); }

  /* ============================================================ */
  /* Mobile                                                       */
  /* ============================================================ */
  @media (max-width: 560px) {
    .site-header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
    .site-nav { width: 100%; justify-content: flex-start; flex-wrap: wrap; gap: 8px; }
    .nav-modules { margin-right: 0; }
    .page { padding: 32px 20px 60px; }
    .module-links { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-brand-mark">routesmithing.com</a>
  <nav class="site-nav" aria-label="Site navigation">
    <div class="nav-modules">
      <a href="/plan/" class="nav-module disabled" aria-disabled="true">Plan</a>
      <a href="/navigate/" class="nav-module disabled" aria-disabled="true">Navigate</a>
      <a href="/report/" class="nav-module disabled" aria-disabled="true">Report</a>
    </div>
    <!-- Nav auth area: toggled by JS -->
    <div class="nav-user" id="nav-user">
      <span class="nav-user-name" id="nav-user-name"></span>
      <button class="nav-signout" id="nav-signout-btn">Sign out</button>
    </div>
    <a href="/account/" class="nav-signin-link" id="nav-signin-link">Sign in</a>
  </nav>
</header>

<div class="page">

  <div class="page-eyebrow">Your account</div>
  <h1 class="page-title">Sign in to Routesmith</h1>
  <p class="page-subtitle">Built for cachers who take the long way.</p>

  <!-- Loading state while Clerk initialises -->
  <div class="loading" id="loading-state">Loading…</div>

  <!-- Clerk mounts the sign-in form here when the user is signed out -->
  <div id="clerk-sign-in" style="display:none;"></div>

  <!-- Shown after successful sign-in -->
  <div class="signed-in-panel" id="signed-in-panel">
    <div class="signed-in-greeting" id="signed-in-greeting">Welcome back.</div>
    <p class="signed-in-sub" id="signed-in-sub"></p>
    <div class="module-links">
      <a href="/plan/" class="module-link disabled" aria-disabled="true">
        <div class="module-link-num">01</div>
        <div class="module-link-name">Plan</div>
        <div class="module-link-status">Coming soon</div>
      </a>
      <a href="/navigate/" class="module-link disabled" aria-disabled="true">
        <div class="module-link-num">02</div>
        <div class="module-link-name">Navigate</div>
        <div class="module-link-status">Coming soon</div>
      </a>
      <a href="/report/" class="module-link active">
        <div class="module-link-num">03</div>
        <div class="module-link-name">Report</div>
        <div class="module-link-status">Open →</div>
      </a>
    </div>
    <button class="signout-btn" id="signout-btn">Sign out</button>
  </div>

</div>

<footer>
  <span class="domain">routesmithing.com</span>
  <span class="sep">·</span>
  <span>Forged 2026</span>
</footer>

<script>
  window.addEventListener('load', async () => {
    await window.Clerk.load({
      appearance: {
        variables: {
          // Match Routesmith palette
          colorPrimary: '#7a5621',
          colorBackground: '#fdfaf0',
          colorInputBackground: '#ffffff',
          colorInputText: '#1f1810',
          colorText: '#1f1810',
          colorTextSecondary: '#4a3f2e',
          colorNeutral: '#c9bda0',
          colorDanger: '#a83328',
          borderRadius: '2px',
          fontFamily: "'Source Serif 4', Charter, Georgia, serif",
          fontFamilyButtons: "'JetBrains Mono', monospace",
          fontSize: '16px',
        },
        elements: {
          card: {
            background: 'rgba(255, 252, 240, 0.7)',
            border: '1px solid #c9bda0',
            borderTop: '3px solid #a87832',
            boxShadow: '0 1px 0 rgba(31,24,16,0.04), 0 8px 24px -16px rgba(31,24,16,0.15)',
            borderRadius: '0',
          },
          headerTitle: {
            fontFamily: "'Fraunces', serif",
            fontWeight: '600',
            fontSize: '1.4rem',
            color: '#1f1810',
          },
          headerSubtitle: {
            fontFamily: "'Source Serif 4', serif",
            color: '#4a3f2e',
          },
          formButtonPrimary: {
            background: '#7a5621',
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: '0.78rem',
            textTransform: 'uppercase',
            letterSpacing: '0.1em',
            borderRadius: '2px',
          },
          footerActionLink: {
            color: '#7a5621',
          },
        },
      },
    });

    const loadingEl       = document.getElementById('loading-state');
    const signInEl        = document.getElementById('clerk-sign-in');
    const signedInPanel   = document.getElementById('signed-in-panel');
    const greetingEl      = document.getElementById('signed-in-greeting');
    const subEl           = document.getElementById('signed-in-sub');
    const signoutBtn      = document.getElementById('signout-btn');
    const navUser         = document.getElementById('nav-user');
    const navUserName     = document.getElementById('nav-user-name');
    const navSigninLink   = document.getElementById('nav-signin-link');
    const navSignoutBtn   = document.getElementById('nav-signout-btn');

    function showSignedIn(user) {
      const name = user.firstName || user.fullName || user.primaryEmailAddress?.emailAddress || 'Cacher';
      loadingEl.style.display = 'none';
      signInEl.style.display = 'none';
      signedInPanel.style.display = 'block';
      greetingEl.textContent = `Welcome back, ${name}.`;
      subEl.textContent = user.primaryEmailAddress?.emailAddress ?? '';

      // Nav
      navSigninLink.style.display = 'none';
      navUser.style.display = 'flex';
      navUserName.textContent = name;
    }

    function showSignedOut() {
      loadingEl.style.display = 'none';
      signedInPanel.style.display = 'none';
      signInEl.style.display = 'block';
      navUser.style.display = 'none';
      navSigninLink.style.display = 'inline-block';

      // Mount Clerk sign-in component
      window.Clerk.mountSignIn(signInEl, {
        routing: 'hash',
        afterSignInUrl: '/account/',
        afterSignUpUrl: '/account/',
      });
    }

    async function handleSignOut() {
      await window.Clerk.signOut();
      showSignedOut();
    }

    signoutBtn.addEventListener('click', handleSignOut);
    navSignoutBtn.addEventListener('click', handleSignOut);

    // Check current auth state
    const user = window.Clerk.user;
    if (user) {
      showSignedIn(user);
    } else {
      showSignedOut();
    }

    // Listen for auth state changes
    window.Clerk.addListener(({ user }) => {
      if (user) showSignedIn(user);
    });
  });
</script>

</body>
</html>
