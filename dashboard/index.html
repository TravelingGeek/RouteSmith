<style>
/* ── Design tokens ──────────────────────────────────────────────── */
:root {
  --paper: #fbf5e6;
  --paper-mid: #f5edd6;
  --ink: #1f1810;
  --ink-soft: #4a3f2e;
  --ink-muted: #7a6f5a;
  --brass: #a87832;
  --brass-deep: #7a5621;
  --forge: #2d5a2a;
  --stamp: #a83328;
  --rule: #c9bda0;
  --rule-soft: #ddd2b5;
  --rail-w: 180px;
  --header-h: 52px;
  --summary-h: 80px;
  --subnav-h: 44px;
  --anim-dur: 180ms;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Source Serif 4', Charter, Georgia, serif;
  font-size: 15px; line-height: 1.5;
  color: var(--ink);
  background: var(--paper);
  display: flex; flex-direction: column;
}

/* ── Top header ─────────────────────────────────────────────────── */
.dash-header {
  height: var(--header-h);
  background: var(--ink);
  display: flex; align-items: center;
  padding: 0 20px; gap: 16px;
  flex-shrink: 0; z-index: 10;
}
.dash-brand {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--brass); text-decoration: none; flex-shrink: 0;
}
.trip-selector-btn {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px; padding: 6px 14px; cursor: pointer;
  transition: background 0.15s; flex: 1; max-width: 380px;
  color: white;
}
.trip-selector-btn:hover { background: rgba(255,255,255,0.14); }
.trip-selector-label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.64rem;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.45); flex-shrink: 0;
}
.trip-selector-name {
  font-family: 'Fraunces', serif; font-weight: 600; font-size: 0.92rem;
  color: white; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.trip-selector-dates {
  font-family: 'JetBrains Mono', monospace; font-size: 0.64rem;
  color: rgba(255,255,255,0.5); flex-shrink: 0;
}
.header-actions { display: flex; gap: 8px; margin-left: auto; align-items: center; }
.header-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.6); background: none;
  border: 1px solid rgba(255,255,255,0.2); padding: 5px 12px;
  border-radius: 2px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.header-btn:hover { color: white; border-color: rgba(255,255,255,0.5); }
.header-user {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: rgba(255,255,255,0.4); white-space: nowrap;
}

/* ── Summary bar ────────────────────────────────────────────────── */
.summary-bar {
  height: var(--summary-h);
  background: var(--paper-mid);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 20px; gap: 4px;
  flex-shrink: 0; overflow-x: auto;
}
.summary-card {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 20px; border-radius: 3px; cursor: pointer; flex-shrink: 0;
  transition: background 0.15s; min-width: 100px;
  border: 1px solid transparent;
}
.summary-card:hover { background: rgba(168,120,50,0.08); border-color: var(--rule); }
.summary-card.active { background: rgba(168,120,50,0.12); border-color: var(--brass); }
.summary-val {
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.5rem;
  color: var(--ink); letter-spacing: -0.02em; line-height: 1;
}
.summary-lbl {
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-muted);
  margin-top: 4px;
}
.summary-sep { width: 1px; height: 36px; background: var(--rule); flex-shrink: 0; }

/* ── Body: rail + content ───────────────────────────────────────── */
.dash-body {
  flex: 1; display: flex; overflow: hidden;
}

/* ── Category rail ──────────────────────────────────────────────── */
.cat-rail {
  width: var(--rail-w);
  background: var(--paper);
  border-right: 1px solid var(--rule);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow-y: auto;
  padding: 12px 8px;
  gap: 2px;
}
.cat-card {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; border-radius: 3px; cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.15s, border-color 0.15s;
  position: relative;
}
.cat-card:hover { background: rgba(168,120,50,0.06); }
.cat-card.active {
  background: rgba(45,90,42,0.08);
  border-color: rgba(45,90,42,0.25);
}
.cat-card.unavailable { opacity: 0.45; cursor: not-allowed; }
.cat-name {
  font-family: 'JetBrains Mono', monospace; font-size: 0.74rem;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--ink-soft); flex: 1;
}
.cat-card.active .cat-name { color: var(--forge); font-weight: 600; }
.cat-pin {
  font-size: 0.7rem; color: var(--rule); cursor: pointer;
  padding: 2px; line-height: 1; transition: color 0.15s;
  background: none; border: none;
}
.cat-pin:hover { color: var(--brass); }
.cat-pin.pinned { color: var(--brass); }
.cat-rail-sep {
  height: 1px; background: var(--rule-soft); margin: 6px 4px;
}

/* ── Content area ───────────────────────────────────────────────── */
.dash-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Sub-nav ────────────────────────────────────────────────────── */
.sub-nav {
  height: var(--subnav-h);
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  display: flex; align-items: center;
  padding: 0 20px; gap: 4px;
  flex-shrink: 0; overflow-x: auto;
}
.sub-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ink-muted); background: none;
  border: none; border-bottom: 2px solid transparent;
  padding: 4px 14px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap; height: 100%;
}
.sub-btn:hover { color: var(--ink); }
.sub-btn.active { color: var(--forge); border-bottom-color: var(--forge); font-weight: 600; }

/* ── Main view ──────────────────────────────────────────────────── */
.main-view {
  flex: 1; overflow: auto; position: relative;
}
.view-panel {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity var(--anim-dur) ease;
}
.view-panel.active {
  opacity: 1; pointer-events: auto;
}
.no-anim .view-panel { transition: none; }

/* Placeholder content */
.placeholder {
  text-align: center; padding: 60px 40px; max-width: 480px;
}
.placeholder-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.3; }
.placeholder-title {
  font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.3rem;
  color: var(--ink-soft); margin-bottom: 8px;
}
.placeholder-sub { font-size: 0.9rem; color: var(--ink-muted); line-height: 1.6; }
.placeholder-link {
  display: inline-block; margin-top: 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.74rem;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--brass-deep); text-decoration: none;
  border-bottom: 1px dotted var(--brass);
}

/* ── Trip selector fly-out ──────────────────────────────────────── */
.flyout-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(31,24,16,0.4); z-index: 50;
}
.flyout-overlay.open { display: block; }
.flyout {
  position: fixed; top: 0; right: -420px; bottom: 0; width: 400px;
  background: var(--paper); border-left: 1px solid var(--rule);
  z-index: 51; display: flex; flex-direction: column;
  transition: right 0.25s ease;
  box-shadow: -4px 0 24px rgba(31,24,16,0.15);
}
.flyout.open { right: 0; }
.flyout-header {
  padding: 20px 24px; border-bottom: 1px solid var(--rule);
  display: flex; justify-content: space-between; align-items: center;
}
.flyout-title {
  font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.2rem; color: var(--ink);
}
.flyout-close {
  font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
  color: var(--ink-muted); background: none; border: none; cursor: pointer;
}
.flyout-body { flex: 1; overflow-y: auto; padding: 16px; }
.flyout-new-btn {
  display: block; width: 100%; text-align: left;
  font-family: 'JetBrains Mono', monospace; font-size: 0.74rem;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--paper); background: var(--forge); border: none;
  padding: 12px 16px; border-radius: 2px; cursor: pointer; margin-bottom: 16px;
  transition: background 0.15s;
}
.flyout-new-btn:hover { background: var(--ink); }
.trip-list-item {
  padding: 12px 16px; border: 1px solid var(--rule); border-radius: 2px;
  cursor: pointer; margin-bottom: 8px; transition: border-color 0.15s, background 0.15s;
}
.trip-list-item:hover { border-color: var(--forge); background: rgba(45,90,42,0.04); }
.trip-list-item.active { border-color: var(--forge); background: rgba(45,90,42,0.08); }
.trip-item-name {
  font-family: 'Fraunces', serif; font-weight: 600; font-size: 0.96rem; color: var(--ink);
}
.trip-item-dates {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--ink-muted);
  margin-top: 2px;
}
.trip-item-status {
  font-family: 'JetBrains Mono', monospace; font-size: 0.64rem;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--brass-deep);
  margin-top: 4px;
}

/* ── Loading ────────────────────────────────────────────────────── */
.loading-overlay {
  position: fixed; inset: 0; background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 12px;
}
.loading-text {
  font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-muted);
}

/* ── Preferences panel ──────────────────────────────────────────── */
.prefs-flyout {
  position: fixed; top: var(--header-h); right: -320px; bottom: 0; width: 300px;
  background: var(--paper); border-left: 1px solid var(--rule);
  z-index: 49; display: flex; flex-direction: column;
  transition: right 0.22s ease;
  box-shadow: -4px 0 20px rgba(31,24,16,0.12);
}
.prefs-flyout.open { right: 0; }
.prefs-header {
  padding: 16px 20px; border-bottom: 1px solid var(--rule-soft);
  font-family: 'JetBrains Mono', monospace; font-size: 0.74rem;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--brass-deep);
  display: flex; justify-content: space-between; align-items: center;
}
.prefs-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.pref-row { margin-bottom: 20px; }
.pref-label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted);
  margin-bottom: 6px; display: block;
}
.pref-desc { font-size: 0.82rem; color: var(--ink-soft); margin-bottom: 8px; }
.toggle-row { display: flex; align-items: center; gap: 10px; }
.toggle {
  width: 36px; height: 20px; border-radius: 10px;
  background: var(--rule); border: none; cursor: pointer;
  position: relative; transition: background 0.2s; flex-shrink: 0;
}
.toggle.on { background: var(--forge); }
.toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 14px; height: 14px; border-radius: 50%; background: white;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(16px); }
.toggle-label { font-size: 0.86rem; color: var(--ink-soft); }

footer {
  position: fixed; bottom: 0; right: 0;
  font-family: 'JetBrains Mono', monospace; font-size: 0.64rem;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--rule);
  padding: 4px 12px; pointer-events: none;
}
</style>
</head>

<script>
const BASE     = 'https://routesmith-report.gtl6645.workers.dev';
const getToken = () => window.Clerk.session.getToken({ template: 'routesmith' });

// ── State ─────────────────────────────────────────────────────────
let state = {
  tripId:       null,
  trip:         null,
  report:       null,
  prefs:        {},
  activeCat:    'counties',
  activeSub:    'map',
  pinnedCats:   ['counties', 'highlights'],
  animEnabled:  true,
};

// ── Category / sub-category definitions ──────────────────────────
const CATEGORIES = [
  {
    id: 'counties', label: 'Counties',
    subs: ['Map', 'New', 'Previously Found', 'Progress'],
  },
  {
    id: 'highlights', label: 'Highlights',
    subs: ['Marquee', 'Featured', 'Notes'],
  },
  {
    id: 'rules', label: 'Rules',
    subs: ['All', 'Marquee', 'Featured', 'Notes'],
  },
  {
    id: 'dayByDay', label: 'Day by Day',
    subs: ['Chart', 'List'],
  },
  {
    id: 'jasmer', label: 'Jasmer Grid',
    subs: ['Trip Fills', 'Full Grid'],
  },
  {
    id: 'dtGrid', label: 'D/T Grid',
    subs: ['Trip Fills', 'Full Grid'],
  },
  {
    id: 'oldest', label: 'Oldest Active',
    subs: ['By State', 'By Country'],
    requiresRef: true, // becomes available when reference files uploaded
  },
  {
    id: 'lifetime', label: 'Lifetime',
    subs: ['County Map', 'All Finds'],
  },
];

// ── Helpers ───────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00Z');
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric', timeZone:'UTC'});
}
function fmtDateRange(s, e) {
  if (!s) return '';
  return s === e ? fmtDate(s) : fmtDate(s) + ' – ' + fmtDate(e);
}
function num(n) { return n != null ? Number(n).toLocaleString() : '—'; }

// ── Animations ────────────────────────────────────────────────────
function setAnimEnabled(enabled) {
  state.animEnabled = enabled;
  document.getElementById('main-view').classList.toggle('no-anim', !enabled);
  const tog = document.getElementById('anim-toggle');
  tog.classList.toggle('on', enabled);
  document.getElementById('anim-label').textContent = enabled ? 'Enabled' : 'Disabled';
}

function toggleAnim() {
  const next = !state.animEnabled;
  setAnimEnabled(next);
  savePref('dashboard.animations_enabled', next);
}

// ── View transitions ──────────────────────────────────────────────
let currentPanelId = null;

function showPanel(panelId) {
  const mainView = document.getElementById('main-view');

  // Hide current panel
  if (currentPanelId && currentPanelId !== panelId) {
    const prev = document.getElementById('panel-' + currentPanelId);
    if (prev) prev.classList.remove('active');
  }

  // Ensure panel exists
  let panel = document.getElementById('panel-' + panelId);
  if (!panel) {
    panel = document.createElement('div');
    panel.className = 'view-panel';
    panel.id = 'panel-' + panelId;
    panel.innerHTML = renderPanel(panelId);
    mainView.appendChild(panel);
  }

  // Small delay for fade effect (only when switching, not first load)
  if (currentPanelId && currentPanelId !== panelId && state.animEnabled) {
    setTimeout(() => panel.classList.add('active'), 20);
  } else {
    panel.classList.add('active');
  }

  currentPanelId = panelId;
}

function renderPanel(panelId) {
  const [catId, subId] = panelId.split('::');
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return placeholder('Unknown view', '', '?');

  if (!state.report) {
    return placeholder(
      'No report data',
      'Run the report from the trip detail page first.',
      '📋',
      `/report/trip.html?id=${state.tripId}`,
      'Go to trip detail →'
    );
  }

  if (cat.requiresRef) {
    return placeholder(
      'Reference file required',
      `This category requires reference list files. Upload them in the Admin panel.`,
      '📁',
      '/admin/',
      'Go to Admin →'
    );
  }

  // Placeholder for all views (data wiring comes next)
  return placeholder(
    `${cat.label} — ${subId || cat.subs[0]}`,
    'This view is being built. Data is loaded and ready.',
    getCatIcon(catId)
  );
}

function placeholder(title, sub, icon, linkHref, linkText) {
  return `<div class="placeholder">
    <div class="placeholder-icon">${icon}</div>
    <div class="placeholder-title">${title}</div>
    <div class="placeholder-sub">${sub}</div>
    ${linkHref ? `<a class="placeholder-link" href="${linkHref}">${linkText}</a>` : ''}
  </div>`;
}

function getCatIcon(id) {
  return {counties:'🗺',highlights:'⭐',rules:'📋',dayByDay:'📅',jasmer:'🟩',dtGrid:'⊞',oldest:'🏆',lifetime:'📦'}[id] || '📄';
}

// ── Navigation ────────────────────────────────────────────────────
function selectCategory(catId, subId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;

  state.activeCat = catId;
  state.activeSub = subId || cat.subs[0].toLowerCase().replace(/\s+/g,'-');

  renderCatRail();
  renderSubNav();
  showPanel(`${catId}::${state.activeSub}`);
}

function selectSub(subId) {
  state.activeSub = subId;
  renderSubNav();
  showPanel(`${state.activeCat}::${subId}`);
}

function onSummaryClick(el) {
  const jump = el.dataset.jump;
  if (jump) selectCategory(jump);
}

// ── Rail rendering ────────────────────────────────────────────────
function renderCatRail() {
  const rail = document.getElementById('cat-rail');
  const pinned    = state.pinnedCats;
  const unpinned  = CATEGORIES.filter(c => !pinned.includes(c.id));
  const pinnedCats = CATEGORIES.filter(c => pinned.includes(c.id));

  let html = '';

  if (pinnedCats.length) {
    pinnedCats.forEach(cat => { html += catCard(cat, true); });
    if (unpinned.length) html += '<div class="cat-rail-sep"></div>';
  }
  unpinned.forEach(cat => { html += catCard(cat, false); });

  rail.innerHTML = html;
}

function catCard(cat, isPinned) {
  const isActive = cat.id === state.activeCat;
  const unavail  = cat.requiresRef; // TODO: check ref file status
  return `<div class="cat-card${isActive?' active':''}${unavail?' unavailable':''}"
    onclick="${unavail ? '' : `selectCategory('${cat.id}')`}">
    <span class="cat-name">${cat.label}</span>
    <button class="cat-pin${isPinned?' pinned':''}"
      onclick="event.stopPropagation();togglePin('${cat.id}')"
      title="${isPinned?'Unpin':'Pin to top'}">★</button>
  </div>`;
}

function togglePin(catId) {
  const idx = state.pinnedCats.indexOf(catId);
  if (idx >= 0) state.pinnedCats.splice(idx, 1);
  else state.pinnedCats.push(catId);
  renderCatRail();
  savePref('dashboard.pinned_categories', state.pinnedCats);
}

// ── Sub-nav rendering ─────────────────────────────────────────────
function renderSubNav() {
  const cat = CATEGORIES.find(c => c.id === state.activeCat);
  if (!cat) return;
  const subnav = document.getElementById('sub-nav');
  subnav.innerHTML = cat.subs.map(sub => {
    const subId = sub.toLowerCase().replace(/\s+/g,'-');
    const isActive = subId === state.activeSub;
    return `<button class="sub-btn${isActive?' active':''}" onclick="selectSub('${subId}')">${sub}</button>`;
  }).join('');
}

// ── Summary bar ───────────────────────────────────────────────────
function updateSummary(report, trip) {
  const agg = report?.aggregate;
  document.getElementById('sum-finds').textContent    = num(report?.trip_find_count);
  document.getElementById('sum-counties').textContent = num(agg?.newCounties);
  document.getElementById('sum-fp').textContent       = num(agg?.favoritePointsEarned);
  document.getElementById('sum-rules').textContent    = num(report?.ruleResults?.length);

  // Days from trip dates
  if (trip?.date_start && trip?.date_end) {
    const days = Math.round((new Date(trip.date_end+'T00:00:00Z') - new Date(trip.date_start+'T00:00:00Z')) / 86400000) + 1;
    document.getElementById('sum-days').textContent = days;
  }
  document.getElementById('sum-miles').textContent = trip?.distance_miles ? num(trip.distance_miles) : '—';
}

// ── Trip selector flyout ──────────────────────────────────────────
function openTripSelector() {
  document.getElementById('flyout-overlay').classList.add('open');
  document.getElementById('trip-flyout').classList.add('open');
  loadTripList();
}
function closeTripSelector() {
  document.getElementById('flyout-overlay').classList.remove('open');
  document.getElementById('trip-flyout').classList.remove('open');
}

async function loadTripList() {
  const el = document.getElementById('trip-list-items');
  el.textContent = 'Loading…';
  const token = await getToken();
  const resp  = await fetch(`${BASE}/api/trips`, {headers:{'Authorization':'Bearer '+token}});
  const data  = await resp.json();
  const trips = data.trips ?? [];
  if (!trips.length) { el.innerHTML = '<p style="color:var(--ink-muted);font-size:0.88rem;">No trips yet.</p>'; return; }
  el.innerHTML = trips.map(t => `
    <div class="trip-list-item${t.trip_id === state.tripId ? ' active' : ''}"
      onclick="selectTrip('${t.trip_id}')">
      <div class="trip-item-name">${t.name}</div>
      <div class="trip-item-dates">${fmtDateRange(t.date_start, t.date_end)}</div>
      <div class="trip-item-status">${t.status}</div>
    </div>`).join('');
}

async function selectTrip(tripId) {
  closeTripSelector();
  await loadTrip(tripId);
}

function newTrip() {
  closeTripSelector();
  location.href = '/report/';
}

// ── Preferences flyout ────────────────────────────────────────────
function openPrefs() { document.getElementById('prefs-flyout').classList.add('open'); }
function closePrefs() { document.getElementById('prefs-flyout').classList.remove('open'); }

async function savePref(key, value) {
  try {
    const token = await getToken();
    await fetch(`${BASE}/api/preferences/${encodeURIComponent(key)}`, {
      method: 'PUT',
      headers: {'Authorization':'Bearer '+token, 'Content-Type':'application/json'},
      body: JSON.stringify({value}),
    });
  } catch(e) { console.warn('pref save failed:', e); }
}

// ── Trip loading ──────────────────────────────────────────────────
async function loadTrip(tripId) {
  state.tripId = tripId;
  state.report = null;

  // Update URL
  const url = new URL(location.href);
  url.searchParams.set('id', tripId);
  history.replaceState({}, '', url);

  // Load trip metadata
  const token = await getToken();
  const tripResp = await fetch(`${BASE}/api/trips/${tripId}`, {
    headers:{'Authorization':'Bearer '+token}
  });
  state.trip = await tripResp.json();

  // Update header
  document.getElementById('trip-name-display').textContent = state.trip.name ?? 'Trip';
  document.getElementById('trip-dates-display').textContent =
    fmtDateRange(state.trip.date_start, state.trip.date_end);

  // Try to load cached report result
  try {
    const tok2 = await getToken();
    const resultResp = await fetch(`${BASE}/api/report/trip/${tripId}/result`, {
      headers:{'Authorization':'Bearer '+tok2}
    });
    if (resultResp.ok) {
      state.report = await resultResp.json();
      document.getElementById('run-report-header-btn').style.display = 'none';
    } else {
      document.getElementById('run-report-header-btn').style.display = 'inline-block';
    }
  } catch { /* no cached result */ }

  updateSummary(state.report, state.trip);

  // Re-render current view with new data
  const mainView = document.getElementById('main-view');
  mainView.innerHTML = '';
  currentPanelId = null;
  showPanel(`${state.activeCat}::${state.activeSub}`);
}

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  await window.Clerk.load();

  const user = window.Clerk.user;
  if (!user) { location.href = '/account/'; return; }

  const name = user.firstName || user.fullName || user.primaryEmailAddress?.emailAddress || '';
  document.getElementById('header-user-name').textContent = name;

  // Load preferences
  try {
    const token = await getToken();
    const prefResp = await fetch(`${BASE}/api/preferences`, {headers:{'Authorization':'Bearer '+token}});
    const prefData = await prefResp.json();
    state.prefs = prefData.preferences ?? {};
    state.pinnedCats   = state.prefs['dashboard.pinned_categories'] ?? ['counties','highlights'];
    state.animEnabled  = state.prefs['dashboard.animations_enabled'] !== false;
  } catch { /* use defaults */ }

  setAnimEnabled(state.animEnabled);

  // Wire buttons
  document.getElementById('trip-selector-btn').addEventListener('click', openTripSelector);
  document.getElementById('prefs-btn').addEventListener('click', openPrefs);
  document.getElementById('signout-btn').addEventListener('click', async () => {
    await window.Clerk.signOut(); location.href = '/account/';
  });
  document.getElementById('run-report-header-btn').addEventListener('click', () => {
    if (state.tripId) location.href = `/report/trip.html?id=${state.tripId}`;
  });

  // Render nav
  renderCatRail();
  selectCategory(state.activeCat, state.activeSub);

  // Load trip from URL if present
  const params = new URLSearchParams(location.search);
  const tripId = params.get('id');

  document.getElementById('loading-overlay').style.display = 'none';

  if (tripId) {
    await loadTrip(tripId);
  } else {
    // No trip — open selector
    openTripSelector();
  }
});
</script>
</body>
</html>
