<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routesmith — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script async crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_cmVhZHktcmVkYmlyZC01Ni5jbGVyay5hY2NvdW50cy5kZXYk"
  src="https://ready-redbird-56.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
  type="text/javascript"></script>
<style>
:root {
  --paper:#fbf5e6; --paper-mid:#f5edd6; --ink:#1f1810; --ink-soft:#4a3f2e; --ink-muted:#7a6f5a;
  --brass:#a87832; --brass-deep:#7a5621; --forge:#2d5a2a; --stamp:#a83328;
  --rule:#c9bda0; --rule-soft:#ddd2b5;
  --rail-w:180px; --header-h:52px; --summary-h:80px; --subnav-h:44px; --anim-dur:180ms;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
html{-webkit-font-smoothing:antialiased;}
body{font-family:'Source Serif 4',Charter,Georgia,serif;font-size:15px;line-height:1.5;color:var(--ink);background:var(--paper);display:flex;flex-direction:column;}

/* ── Header ── */
.dash-header{height:var(--header-h);background:var(--ink);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:10;}
.dash-brand{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.14em;color:var(--brass);text-decoration:none;flex-shrink:0;}
.trip-selector-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:3px;padding:6px 14px;cursor:pointer;transition:background 0.15s;flex:1;max-width:380px;color:white;}
.trip-selector-btn:hover{background:rgba(255,255,255,0.14);}
.trip-selector-label{font-family:'JetBrains Mono',monospace;font-size:0.64rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.45);flex-shrink:0;}
.trip-selector-name{font-family:'Fraunces',serif;font-weight:600;font-size:0.92rem;color:white;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.trip-selector-dates{font-family:'JetBrains Mono',monospace;font-size:0.64rem;color:rgba(255,255,255,0.5);flex-shrink:0;}
.header-actions{display:flex;gap:8px;margin-left:auto;align-items:center;}
.header-btn{font-family:'JetBrains Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.6);background:none;border:1px solid rgba(255,255,255,0.2);padding:5px 12px;border-radius:2px;cursor:pointer;transition:color 0.15s,border-color 0.15s;white-space:nowrap;}
.header-btn:hover{color:white;border-color:rgba(255,255,255,0.5);}
.header-user{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:rgba(255,255,255,0.4);white-space:nowrap;}

/* ── Summary bar ── */
.summary-bar{height:var(--summary-h);background:var(--paper-mid);border-bottom:1px solid var(--rule);display:flex;align-items:center;padding:0 20px;gap:4px;flex-shrink:0;overflow-x:auto;}
.summary-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 20px;border-radius:3px;cursor:pointer;flex-shrink:0;transition:background 0.15s;min-width:100px;border:1px solid transparent;}
.summary-card:hover{background:rgba(168,120,50,0.08);border-color:var(--rule);}
.summary-val{font-family:'Fraunces',serif;font-weight:700;font-size:1.5rem;color:var(--ink);letter-spacing:-0.02em;line-height:1;}
.summary-lbl{font-family:'JetBrains Mono',monospace;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);margin-top:4px;}
.summary-sep{width:1px;height:36px;background:var(--rule);flex-shrink:0;}

/* ── Body ── */
.dash-body{flex:1;display:flex;overflow:hidden;}

/* ── Category rail ── */
.cat-rail{width:var(--rail-w);background:var(--paper);border-right:1px solid var(--rule);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:12px 8px;gap:2px;}
.cat-card{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:3px;cursor:pointer;border:1px solid transparent;transition:background 0.15s,border-color 0.15s;}
.cat-card:hover{background:rgba(168,120,50,0.06);}
.cat-card.active{background:rgba(45,90,42,0.08);border-color:rgba(45,90,42,0.25);}
.cat-card.unavailable{opacity:0.45;cursor:not-allowed;}
.cat-name{font-family:'JetBrains Mono',monospace;font-size:0.74rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);flex:1;}
.cat-card.active .cat-name{color:var(--forge);font-weight:600;}
.cat-pin{font-size:0.7rem;color:var(--rule);cursor:pointer;padding:2px;line-height:1;transition:color 0.15s;background:none;border:none;}
.cat-pin:hover{color:var(--brass);}
.cat-pin.pinned{color:var(--brass);}
.cat-rail-sep{height:1px;background:var(--rule-soft);margin:6px 4px;}

/* ── Content area ── */
.dash-content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sub-nav{height:var(--subnav-h);border-bottom:1px solid var(--rule);background:var(--paper);display:flex;align-items:center;padding:0 20px;gap:4px;flex-shrink:0;overflow-x:auto;}
.sub-btn{font-family:'JetBrains Mono',monospace;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-muted);background:none;border:none;border-bottom:2px solid transparent;padding:4px 14px;cursor:pointer;transition:color 0.15s,border-color 0.15s;white-space:nowrap;height:100%;}
.sub-btn:hover{color:var(--ink);}
.sub-btn.active{color:var(--forge);border-bottom-color:var(--forge);font-weight:600;}

/* ── Main view ── */
.main-view{flex:1;overflow:hidden;position:relative;}
.view-panel{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity var(--anim-dur) ease;}
.view-panel.active{opacity:1;pointer-events:auto;}
.no-anim .view-panel{transition:none;}

/* ── Placeholder ── */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px;}
.placeholder-icon{font-size:2.5rem;margin-bottom:16px;opacity:0.3;}
.placeholder-title{font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;color:var(--ink-soft);margin-bottom:8px;}
.placeholder-sub{font-size:0.9rem;color:var(--ink-muted);line-height:1.6;max-width:400px;}
.placeholder-run-btn{display:inline-block;margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:0.74rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--paper);background:var(--forge);border:none;padding:10px 24px;border-radius:2px;cursor:pointer;transition:background 0.15s;}
.placeholder-run-btn:hover{background:var(--ink);}
.placeholder-run-btn:disabled{opacity:0.5;cursor:not-allowed;}
.placeholder-link{display:inline-block;margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:0.74rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--brass-deep);text-decoration:none;border-bottom:1px dotted var(--brass);}

/* ── County map panel ── */
.map-panel{position:absolute;inset:0;display:flex;width:100%;height:100%;}
.map-area{flex:1;position:relative;height:100%;min-width:0;}
#county-map{position:absolute;top:0;right:0;bottom:0;left:0;width:100%;height:100%;}
.map-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--paper);z-index:3;font-family:'JetBrains Mono',monospace;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);}
.map-sidebar{width:260px;flex-shrink:0;background:var(--paper);border-left:1px solid var(--rule);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.map-sidebar-section{border-bottom:1px solid var(--rule-soft);}
.map-sidebar-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;cursor:pointer;user-select:none;}
.map-sidebar-hdr:hover{background:rgba(168,120,50,0.04);}
.map-sidebar-lbl{font-family:'JetBrains Mono',monospace;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-muted);}
.map-sidebar-chev{font-size:0.68rem;color:var(--ink-muted);transition:transform 0.2s;}
.map-sidebar-chev.open{transform:rotate(180deg);}
.map-sidebar-body{overflow:hidden;transition:max-height 0.25s ease,padding 0.25s ease;}
.map-sidebar-body.open{max-height:600px;padding:8px 12px;}
.map-sidebar-body.closed{max-height:0;padding:0 12px;}
.viz-toggle{display:flex;background:var(--paper-mid);border:1px solid var(--rule);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.viz-btn{flex:1;padding:5px 0;border:none;background:transparent;font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-muted);cursor:pointer;transition:background 0.15s,color 0.15s;border-right:1px solid var(--rule);}
.viz-btn:last-child{border-right:none;}
.viz-btn:hover{background:var(--rule-soft);color:var(--ink);}
.viz-btn.active{background:var(--forge);color:white;font-weight:600;}
.map-legend-rows{display:flex;flex-direction:column;gap:5px;}
.map-legend-row{display:flex;align-items:center;gap:7px;font-size:0.72rem;color:var(--ink-muted);}
.map-legend-swatch{width:18px;height:11px;border-radius:2px;border:1px solid rgba(0,0,0,0.12);flex-shrink:0;}
.finder-row{display:flex;align-items:center;gap:6px;font-size:0.74rem;color:var(--ink-soft);}
.finder-dot-sm{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,0.12);}

.map-info-box{padding:8px 12px;font-size:0.76rem;color:var(--ink-muted);line-height:1.5;flex-shrink:0;border-top:1px solid var(--rule-soft);}


/* ── County list panel ── */
.county-list-panel{position:absolute;inset:0;overflow-y:auto;padding:20px;}
.county-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.county-item{padding:8px 12px;border:1px solid var(--rule-soft);border-radius:2px;font-size:0.86rem;}
.county-item.new-county{border-color:var(--forge);background:rgba(45,90,42,0.06);}
.county-item-name{font-weight:600;color:var(--ink);}
.county-item-state{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--ink-muted);}
.county-item-badge{font-family:'JetBrains Mono',monospace;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--forge);margin-top:2px;}

/* ── Trip flyout ── */
.flyout-overlay{display:none;position:fixed;inset:0;background:rgba(31,24,16,0.4);z-index:50;}
.flyout-overlay.open{display:block;}
.flyout{position:fixed;top:0;right:-420px;bottom:0;width:400px;background:var(--paper);border-left:1px solid var(--rule);z-index:51;display:flex;flex-direction:column;transition:right 0.25s ease;box-shadow:-4px 0 24px rgba(31,24,16,0.15);}
.flyout.open{right:0;}
.flyout-header{padding:20px 24px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;}
.flyout-title{font-family:'Fraunces',serif;font-weight:600;font-size:1.2rem;color:var(--ink);}
.flyout-close{font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--ink-muted);background:none;border:none;cursor:pointer;}
.flyout-body{flex:1;overflow-y:auto;padding:16px;}
.flyout-new-btn{display:block;width:100%;text-align:left;font-family:'JetBrains Mono',monospace;font-size:0.74rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--paper);background:var(--forge);border:none;padding:12px 16px;border-radius:2px;cursor:pointer;margin-bottom:16px;transition:background 0.15s;}
.flyout-new-btn:hover{background:var(--ink);}
.trip-list-item{padding:12px 16px;border:1px solid var(--rule);border-radius:2px;cursor:pointer;margin-bottom:8px;transition:border-color 0.15s,background 0.15s;}
.trip-list-item:hover{border-color:var(--forge);background:rgba(45,90,42,0.04);}
.trip-list-item.active{border-color:var(--forge);background:rgba(45,90,42,0.08);}
.trip-item-name{font-family:'Fraunces',serif;font-weight:600;font-size:0.96rem;color:var(--ink);}
.trip-item-dates{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--ink-muted);margin-top:2px;}
.trip-item-status{font-family:'JetBrains Mono',monospace;font-size:0.64rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--brass-deep);margin-top:4px;}

/* ── Prefs flyout ── */
.prefs-flyout{position:fixed;top:var(--header-h);right:-320px;bottom:0;width:300px;background:var(--paper);border-left:1px solid var(--rule);z-index:49;display:flex;flex-direction:column;transition:right 0.22s ease;box-shadow:-4px 0 20px rgba(31,24,16,0.12);}
.prefs-flyout.open{right:0;}
.prefs-header{padding:16px 20px;border-bottom:1px solid var(--rule-soft);font-family:'JetBrains Mono',monospace;font-size:0.74rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--brass-deep);display:flex;justify-content:space-between;align-items:center;}
.prefs-body{flex:1;overflow-y:auto;padding:16px 20px;}
.pref-row{margin-bottom:20px;}
.pref-label{font-family:'JetBrains Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-muted);margin-bottom:6px;display:block;}
.pref-desc{font-size:0.82rem;color:var(--ink-soft);margin-bottom:8px;}
.toggle-row{display:flex;align-items:center;gap:10px;}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--rule);border:none;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--forge);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:white;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(16px);}
.toggle-label{font-size:0.86rem;color:var(--ink-soft);}

/* ── Loading overlay ── */
.loading-overlay{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:12px;}
.loading-text{font-family:'JetBrains Mono',monospace;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-muted);}

footer{position:fixed;bottom:0;right:0;font-family:'JetBrains Mono',monospace;font-size:0.64rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--rule);padding:4px 12px;pointer-events:none;}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-text">Loading dashboard…</div>
</div>

<header class="dash-header">
  <a href="/" class="dash-brand">RS</a>
  <button class="trip-selector-btn" id="trip-selector-btn">
    <span class="trip-selector-label">Trip</span>
    <span class="trip-selector-name" id="trip-name-display">Select a trip</span>
    <span class="trip-selector-dates" id="trip-dates-display"></span>
    <span style="color:rgba(255,255,255,0.3);font-size:0.8rem;">▼</span>
  </button>
  <div class="header-actions">
    <button class="header-btn" id="run-report-header-btn" style="display:none;">Run Report</button>
    <button class="header-btn" id="prefs-btn">⚙ Settings</button>
    <span class="header-user" id="header-user-name"></span>
    <button class="header-btn" id="signout-btn">Sign out</button>
  </div>
</header>

<div class="summary-bar">
  <div class="summary-card" onclick="selectCategory('highlights')">
    <div class="summary-val" id="sum-finds">—</div>
    <div class="summary-lbl">Finds</div>
  </div>
  <div class="summary-sep"></div>
  <div class="summary-card" onclick="selectCategory('counties')">
    <div class="summary-val" id="sum-counties">—</div>
    <div class="summary-lbl">New Counties</div>
  </div>
  <div class="summary-sep"></div>
  <div class="summary-card">
    <div class="summary-val" id="sum-fp">—</div>
    <div class="summary-lbl">Fav Points</div>
  </div>
  <div class="summary-sep"></div>
  <div class="summary-card">
    <div class="summary-val" id="sum-days">—</div>
    <div class="summary-lbl">Days</div>
  </div>
  <div class="summary-sep"></div>
  <div class="summary-card">
    <div class="summary-val" id="sum-miles">—</div>
    <div class="summary-lbl">Miles</div>
  </div>
  <div class="summary-sep"></div>
  <div class="summary-card" onclick="selectCategory('rules')">
    <div class="summary-val" id="sum-rules">—</div>
    <div class="summary-lbl">Rules Fired</div>
  </div>
</div>

<div class="dash-body">
  <nav class="cat-rail" id="cat-rail"></nav>
  <div class="dash-content">
    <div class="sub-nav" id="sub-nav"></div>
    <div class="main-view" id="main-view"></div>
  </div>
</div>

<!-- Trip flyout -->
<div class="flyout-overlay" id="flyout-overlay" onclick="closeTripSelector()"></div>
<div class="flyout" id="trip-flyout">
  <div class="flyout-header">
    <span class="flyout-title">Your Trips</span>
    <button class="flyout-close" onclick="closeTripSelector()">✕ Close</button>
  </div>
  <div class="flyout-body">
    <button class="flyout-new-btn" onclick="newTrip()">+ New Trip</button>
    <div id="trip-list-items">Loading…</div>
  </div>
</div>

<!-- Prefs flyout -->
<div class="prefs-flyout" id="prefs-flyout">
  <div class="prefs-header">
    <span>Settings</span>
    <button class="flyout-close" onclick="closePrefs()">✕</button>
  </div>
  <div class="prefs-body">
    <div class="pref-row">
      <span class="pref-label">Dashboard Animations</span>
      <p class="pref-desc">Enable fade transitions when switching views.</p>
      <div class="toggle-row">
        <button class="toggle" id="anim-toggle" onclick="toggleAnim()"></button>
        <span class="toggle-label" id="anim-label">Enabled</span>
      </div>
    </div>
  </div>
</div>

<footer>Build 2026.07.05.032</footer>

<script>
const BASE     = 'https://routesmith-report.gtl6645.workers.dev';
const getToken = () => window.Clerk.session.getToken({ template: 'routesmith' });

// ── State ─────────────────────────────────────────────────────────
let MAPBOX_TOKEN = ''; // loaded from Worker at runtime

const state = {
  tripId:null, trip:null, report:null, prefs:{},
  activeCat:'counties', activeSub:'map',
  pinnedCats:['counties','highlights'],
  animEnabled:true,
  lifetimeCounties:null,
  geojson:null,
};

// ── Categories ────────────────────────────────────────────────────
const CATEGORIES = [
  { id:'counties',   label:'Counties',      subs:['Map','New','Previously Found','Progress'] },
  { id:'highlights', label:'Highlights',    subs:['Marquee','Featured','Notes'] },
  { id:'rules',      label:'Rules',         subs:['All','Marquee','Featured','Notes'] },
  { id:'dayByDay',   label:'Day by Day',    subs:['Chart','List'] },
  { id:'jasmer',     label:'Jasmer Grid',   subs:['Trip Fills','Full Grid'] },
  { id:'dtGrid',     label:'D/T Grid',      subs:['Trip Fills','Full Grid'] },
  { id:'oldest',     label:'Oldest Active', subs:['By State','By Country'], requiresRef:true },
  { id:'lifetime',   label:'Lifetime',      subs:['County Map','All Finds'] },
];

function subId(s) { return s.toLowerCase().replace(/\s+/g,'-'); }

// ── Helpers ───────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso+'T00:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',timeZone:'UTC'});
}
function fmtDateRange(s,e) { return !s?'':s===e?fmtDate(s):fmtDate(s)+' – '+fmtDate(e); }
function num(n) { return n!=null?Number(n).toLocaleString():'—'; }

// ── STATE_FIPS ────────────────────────────────────────────────────
const STATE_FIPS = {
  AL:'01',AK:'02',AZ:'04',AR:'05',CA:'06',CO:'08',CT:'09',DE:'10',FL:'12',GA:'13',
  HI:'15',ID:'16',IL:'17',IN:'18',IA:'19',KS:'20',KY:'21',LA:'22',ME:'23',MD:'24',
  MA:'25',MI:'26',MN:'27',MS:'28',MO:'29',MT:'30',NE:'31',NV:'32',NH:'33',NJ:'34',
  NM:'35',NY:'36',NC:'37',ND:'38',OH:'39',OK:'40',OR:'41',PA:'42',RI:'44',SC:'45',
  SD:'46',TN:'47',TX:'48',UT:'49',VT:'50',VA:'51',WA:'53',WV:'54',WI:'55',WY:'56',
  DC:'11',PR:'72',
};
const FIPS_TO_STATE = Object.fromEntries(Object.entries(STATE_FIPS).map(([a,f])=>[f,a]));

const STATE_NAME_TO_ABBREV = {
  'Alabama':'AL','Alaska':'AK','Arizona':'AZ','Arkansas':'AR','California':'CA',
  'Colorado':'CO','Connecticut':'CT','Delaware':'DE','Florida':'FL','Georgia':'GA',
  'Hawaii':'HI','Idaho':'ID','Illinois':'IL','Indiana':'IN','Iowa':'IA','Kansas':'KS',
  'Kentucky':'KY','Louisiana':'LA','Maine':'ME','Maryland':'MD','Massachusetts':'MA',
  'Michigan':'MI','Minnesota':'MN','Mississippi':'MS','Missouri':'MO','Montana':'MT',
  'Nebraska':'NE','Nevada':'NV','New Hampshire':'NH','New Jersey':'NJ','New Mexico':'NM',
  'New York':'NY','North Carolina':'NC','North Dakota':'ND','Ohio':'OH','Oklahoma':'OK',
  'Oregon':'OR','Pennsylvania':'PA','Rhode Island':'RI','South Carolina':'SC',
  'South Dakota':'SD','Tennessee':'TN','Texas':'TX','Utah':'UT','Vermont':'VT',
  'Virginia':'VA','Washington':'WA','West Virginia':'WV','Wisconsin':'WI','Wyoming':'WY',

};

function stateToAbbrev(s) {
  if (!s) return null;
  if (s.length === 2 && STATE_FIPS[s.toUpperCase()]) return s.toUpperCase();
  return STATE_NAME_TO_ABBREV[s] ?? null;
}

// ── FIPS cache ────────────────────────────────────────────────────
let countyFipsCache = null;
function buildFipsCache(geojson) {
  if (countyFipsCache) return countyFipsCache;
  countyFipsCache = new Map();
  for (const feat of geojson.features) {
    const fips   = String(feat.id).padStart(5,'0');
    const name   = (feat.properties.NAME||'').toLowerCase();
    const prefix = fips.slice(0,2);
    const abbrev = FIPS_TO_STATE[prefix];
    if (abbrev) countyFipsCache.set(`${abbrev}|${name}`, fips);
  }
  return countyFipsCache;
}

function fipsForCounty(countyName, stateInput) {
  const abbrev = stateToAbbrev(stateInput);
  if (!abbrev || !countyFipsCache) return null;
  const name = countyName.toLowerCase();
  if (countyFipsCache.has(`${abbrev}|${name}`)) return countyFipsCache.get(`${abbrev}|${name}`);
  const stripped = name.replace(/\s+(county|parish|borough|census area|municipality|city and borough|city|island)$/,'').trim();
  return countyFipsCache.get(`${abbrev}|${stripped}`) ?? null;
}

// ── Data loaders ──────────────────────────────────────────────────
async function loadGeoJson() {
  if (state.geojson) return state.geojson;
  const resp = await fetch('https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json');
  state.geojson = await resp.json();
  return state.geojson;
}

async function loadLifetimeCounties() {
  if (state.lifetimeCounties) return state.lifetimeCounties;
  const token = await getToken();
  const resp  = await fetch(`${BASE}/api/county-map/lifetime`, {headers:{'Authorization':'Bearer '+token}});
  const data  = await resp.json();
  state.lifetimeCounties = data.counties ?? [];
  return state.lifetimeCounties;
}

let mapInstance    = null;
let mapLoaded      = false;
let currentBaseMap = 'road';
let mapCountyFips  = {};

const BASE_STYLES = {
  road:    'mapbox://styles/mapbox/navigation-day-v1',
  terrain: 'mapbox://styles/mapbox/outdoors-v12',

function toggleMapSection(id) {

  const chev = document.getElementById('mschev-'+id);
  if (!body||!chev) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  body.classList.toggle('closed',isOpen);
  chev.classList.toggle('open',!isOpen);
}

function setVizMode(mode) {
  ['pins','arcs','rings'].forEach(m=>{
    const btn=document.getElementById('vbtn-'+m);
    if(btn&&!btn.disabled) btn.classList.toggle('active',m===mode);
  });

function setBaseMap(mode) {
  if (currentBaseMap===mode) return;
  currentBaseMap = mode;
  ['road','terrain','topo'].forEach(m=>{
    const btn=document.getElementById('bmap-'+m);
    if(btn) btn.classList.toggle('active',m===mode);
  });
  if (!mapInstance) return;
  mapInstance.setStyle(BASE_STYLES[mode],{diff:false});
  const onStyleReady = () => {
    if (currentBaseMap==='topo') addTopoOverlay();
    const src = state._lastPaintedGeojson;
    if (src) {
      try { if (mapInstance.getSource('counties')) mapInstance.removeSource('counties'); } catch(e){}
      mapInstance.addSource('counties',{type:'geojson',data:src});
    }
    rebuildMapLayers();
  };
  mapInstance.once('style.load', onStyleReady);
  mapInstance.once('load', onStyleReady);
  const styleReadyPoll = setInterval(()=>{
    if (mapInstance.isStyleLoaded()) { clearInterval(styleReadyPoll); onStyleReady(); }
  }, 100);
  setTimeout(()=>{ clearInterval(styleReadyPoll); }, 8000);
}

function addTopoOverlay() {
  if (mapInstance.getSource('usgs-topo-src')) return;
  mapInstance.addSource('usgs-topo-src',{
    type:'raster',
    tiles:['https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}'],
    tileSize:256,maxzoom:16
  });
  mapInstance.addLayer({id:'usgs-topo',type:'raster',source:'usgs-topo-src',paint:{'raster-opacity':1.0}},'waterway-label');
}

// ── County map render ─────────────────────────────────────────────
async function renderCountyMap() {
  const loadingEl = document.getElementById('map-loading-indicator');
  if (loadingEl) loadingEl.style.display='flex';

  try {
    const [geojson, lifetime] = await Promise.all([loadGeoJson(), loadLifetimeCounties()]);
    buildFipsCache(geojson);

    const lifetimeFips = new Set();
    const tripNewFips  = new Set();
    const tripPrevFips = new Set();

    for (const c of lifetime) {
      const fips = fipsForCounty(c.county, c.state);
      if (fips) lifetimeFips.add(fips);
    }
    if (state.report?.countiesData) {
      for (const key of (state.report.countiesData.firstTime??[])) {
        const [county,st] = key.split('|');
        const fips = fipsForCounty(county,st);
        if (fips) { tripNewFips.add(fips); lifetimeFips.add(fips); }
      }
      for (const key of (state.report.countiesData.previouslyFound??[])) {
        const [county,st] = key.split('|');
        const fips = fipsForCounty(county,st);
        if (fips) { tripPrevFips.add(fips); lifetimeFips.add(fips); }
      }
    }

    const FILL_COLORS   = {3:'#2d8a3e', 2:'#78b882', 1:'#8a7a64', 0:'rgba(0,0,0,0)'};
    const BORDER_COLORS = {3:'#1a5c28', 2:'#4a8a54', 1:'#6a5a44', 0:'rgba(0,0,0,0)'};
    const FILL_OPS      = {3:0.75,      2:0.55,      1:0.55,      0:0};
    const BORDER_OPS    = {3:0.85,      2:0.75,      1:0.65,      0:0};
    const BORDER_WIDTHS = {3:1.5,       2:1.0,       1:0.6,       0:0};

    mapCountyFips = {};
    for (const feat of geojson.features) {
      const fips        = String(feat.id).padStart(5,'0');
      const stateAbbrev = FIPS_TO_STATE[fips.slice(0,2)]??'';
      let status = 0;
      if      (tripNewFips.has(fips))  status = 3;
      else if (tripPrevFips.has(fips)) status = 2;
      else if (lifetimeFips.has(fips)) status = 1;
      mapCountyFips[fips] = {county:feat.properties.NAME, stateAbbrev, status};
    }

    state._lastPaintedGeojson = null; // will be set below
    const paintedGeojson = {
      type: 'FeatureCollection',
      features: geojson.features.map(f=>{
        const fips   = String(f.id).padStart(5,'0');
        const meta   = mapCountyFips[fips];
        const status = meta?.status ?? 0;
        return {
          type: 'Feature',
          id:   f.id,
          geometry: f.geometry,
          properties: {
            NAME:        f.properties.NAME,
            stateAbbrev: meta?.stateAbbrev ?? '',
            status,
            fillColor:   FILL_COLORS[status],
            fillOp:      FILL_OPS[status],
            borderColor: BORDER_COLORS[status],
            borderOp:    BORDER_OPS[status],
            borderWidth: BORDER_WIDTHS[status],
          }
        };
      })
    };

    state._lastPaintedGeojson = paintedGeojson;

    if (!mapInstance) {
      mapboxgl.accessToken = MAPBOX_TOKEN;
      mapboxgl.config.EVENTS_URL = ''; // disable telemetry
      mapInstance = new mapboxgl.Map({
        container:'county-map',
        style:BASE_STYLES[currentBaseMap],
        center:[-96,38], zoom:3.5,
        preserveDrawingBuffer:true,
      });
      mapInstance.addControl(new mapboxgl.NavigationControl(),'bottom-left');

      // POC-style dual-listener + polling for reliable style ready detection
      const onMapReady = () => {
        if (mapLoaded) return;
        mapLoaded = true;
        clearInterval(mapReadyPoll);
        buildMapLayers(paintedGeojson);
        fitMapToBounds(tripNewFips,tripPrevFips,geojson);
        if (loadingEl) loadingEl.style.display='none';
        // Force resize to ensure canvas fills container
        setTimeout(()=>mapInstance.resize(), 100);
      };
      mapInstance.once('style.load', onMapReady);
      mapInstance.once('load', onMapReady);
      const mapReadyPoll = setInterval(()=>{
        if (mapInstance.isStyleLoaded()) onMapReady();
      }, 100);
      setTimeout(()=>{ clearInterval(mapReadyPoll); onMapReady(); }, 10000);
    } else if (mapLoaded) {
      if (mapInstance.getSource('counties')) {
        mapInstance.getSource('counties').setData(paintedGeojson);
      } else {
        buildMapLayers(paintedGeojson);
      }
      fitMapToBounds(tripNewFips,tripPrevFips,geojson);
      if (loadingEl) loadingEl.style.display='none';
    }

    mapInstance.resize();
    buildMapSidebar(tripNewFips,tripPrevFips);

  } catch(e) {
    console.error('Map error:',e);
    if (loadingEl) loadingEl.textContent='Error loading map: '+e.message;
  }
}

function buildMapLayers(paintedGeojson) {
  if (mapInstance.getSource('counties')) {
    mapInstance.getSource('counties').setData(paintedGeojson);
    return;
  }
  mapInstance.addSource('counties',{type:'geojson',data:paintedGeojson});
  rebuildMapLayers();
  wireMapEvents();
}

function rebuildMapLayers() {
  ['county-fill','county-border'].forEach(id=>{
    try{if(mapInstance.getLayer(id))mapInstance.removeLayer(id);}catch(e){}
  });
  mapInstance.addLayer({
    id:'county-fill', type:'fill', source:'counties',
    filter:['>', ['get','status'], 0],
    paint:{
      'fill-color':   ['coalesce',['get','fillColor'],'rgba(0,0,0,0)'],
      'fill-opacity': ['coalesce',['get','fillOp'],0],
    }
  });
  mapInstance.addLayer({
    id:'county-border', type:'line', source:'counties',
    filter:['>', ['get','status'], 0],
    paint:{
      'line-color':   ['coalesce',['get','borderColor'],'rgba(0,0,0,0)'],
      'line-width':   ['coalesce',['get','borderWidth'],0],
      'line-opacity': ['coalesce',['get','borderOp'],0],
    }
  });
}

function wireMapEvents() {
  // Click to show county detail
  mapInstance.on('click','county-fill',e=>{
    if (!e.features.length) return;
    const f   = e.features[0];
    const st  = f.properties.status ?? 0;
    if (st===0) return;
    const fips = String(f.id).padStart(5,'0');
    highlightCountyInSidebar(fips);
  });
  mapInstance.on('mouseenter','county-fill',()=>{ mapInstance.getCanvas().style.cursor='pointer'; });
  mapInstance.on('mouseleave','county-fill',()=>{ mapInstance.getCanvas().style.cursor=''; });
}

function fitMapToBounds(tripNewFips,tripPrevFips,geojson) {
  const tripFips = new Set([...tripNewFips,...tripPrevFips]);
  if (!tripFips.size) return;
  let minLng=180,maxLng=-180,minLat=90,maxLat=-90;
  for (const feat of geojson.features) {
    const fips = String(feat.id).padStart(5,'0');
    if (!tripFips.has(fips)) continue;
    const coords = feat.geometry.type==='Polygon'
      ? feat.geometry.coordinates[0]
      : feat.geometry.coordinates.flat(2);
    for (const [lng,lat] of coords) {
      if(lng<minLng)minLng=lng;if(lng>maxLng)maxLng=lng;
      if(lat<minLat)minLat=lat;if(lat>maxLat)maxLat=lat;
    }
  }
  if (minLng<maxLng) {
    mapInstance.fitBounds([[minLng,minLat],[maxLng,maxLat]],{
      padding:{top:40,bottom:40,left:40,right:40},maxZoom:8,duration:800
    });
  }
}

function buildMapSidebar(tripNewFips,tripPrevFips) {
  const ownerNameEl = document.getElementById('map-owner-name');
  if (ownerNameEl && state.report?.owner) {
    ownerNameEl.textContent = state.report.owner.gc_username||state.report.owner.display_name||'—';
  }

  // County list removed — stats and gc.com link coming in next iteration (see todo)
}

function flyToCounty(fips) {
  if (!mapLoaded||!state.geojson) return;
  const feat = state.geojson.features.find(f=>String(f.id).padStart(5,'0')===fips);
  if (!feat) return;
  const coords = feat.geometry.type==='Polygon'
    ? feat.geometry.coordinates[0]
    : feat.geometry.coordinates[0][0];
  const lng = coords.reduce((s,p)=>s+p[0],0)/coords.length;
  const lat = coords.reduce((s,p)=>s+p[1],0)/coords.length;
  mapInstance.flyTo({center:[lng,lat],zoom:9,speed:1.2});
  highlightCountyInSidebar(fips);
}

function highlightCountyInSidebar(fips) {
  const meta   = mapCountyFips[fips];
  const infoEl = document.getElementById('map-info-box');
  if (!infoEl||!meta) return;
  const label = meta.status===3?'New this trip':meta.status===2?'Found again':meta.status===1?'Lifetime find':'Never found';
  const color = meta.status===3?'var(--forge)':meta.status===2?'#4a7a54':'var(--ink-muted)';
  // TODO: add more statistics and gc.com link here
  infoEl.innerHTML=`<strong style="color:var(--ink);font-family:'Fraunces',serif;">${meta.county} County, ${meta.stateAbbrev}</strong><br>
    <span style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:${color};">${label}</span>`;
}

async function captureCountyMap() {
  const btn = document.getElementById('map-capture-btn');
  if (!btn||!mapInstance) return;
  if (!mapLoaded) { alert('Map is still loading — please wait.'); return; }
  btn.disabled=true; btn.textContent='Capturing…';
  try {
    // Trigger a render to ensure canvas is up to date
    mapInstance.triggerRepaint();
    await new Promise(r=>setTimeout(r,200));
    const canvas = mapInstance.getCanvas();
    if (canvas.width===0||canvas.height===0) throw new Error('Map canvas has no dimensions.');
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download=`routesmith-map-${Date.now()}.png`;
    a.click();
  } catch(e) { alert('Capture failed: '+e.message); }
  finally { btn.disabled=false; btn.textContent='Capture Map PNG'; }
}

// ── County list renderers ─────────────────────────────────────────
function renderCountyList(filterFn,emptyMsg) {
  if (!state.report) return placeholder('No report data','Run the report first.','📋');
  const firstTime = new Set(state.report.countiesData?.firstTime??[]);
  const prevFound = new Set(state.report.countiesData?.previouslyFound??[]);
  const keys = [...filterFn(firstTime,prevFound)];
  if (!keys.length) return `<div class="county-list-panel"><p style="color:var(--ink-muted);padding:40px;text-align:center;">${emptyMsg}</p></div>`;
  const items = keys.map(key=>{
    const [county,st]=key.split('|');
    const isNew=firstTime.has(key);
    return `<div class="county-item${isNew?' new-county':''}">
      <div class="county-item-name">${county}</div>
      <div class="county-item-state">${st}</div>
      ${isNew?'<div class="county-item-badge">New</div>':''}
    </div>`;
  }).join('');
  return `<div class="county-list-panel"><div class="county-grid">${items}</div></div>`;
}

// ── Navigation ────────────────────────────────────────────────────
let currentPanelId = null;

async function showPanel(panelId) {
  const mainView = document.getElementById('main-view');
  if (currentPanelId && currentPanelId!==panelId) {
    const prev = document.getElementById('panel-'+currentPanelId);
    if (prev) prev.classList.remove('active');
  }
  let panel = document.getElementById('panel-'+panelId);
  if (!panel) {
    const [catId,sub] = panelId.split('::');
    panel = document.createElement('div');
    panel.className = 'view-panel';
    panel.id = 'panel-'+panelId;
    panel.innerHTML = renderPanelContent(catId,sub);
    mainView.appendChild(panel);
  }
  const delay = (currentPanelId && currentPanelId!==panelId && state.animEnabled) ? 20 : 0;
  setTimeout(()=>panel.classList.add('active'), delay);
  currentPanelId = panelId;

  const [catId,sub] = panelId.split('::');
  if (catId==='counties' && sub==='map') {
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const container = document.getElementById('county-map');
      if (container) {
        renderCountyMap();
        // Force resize after render
        setTimeout(()=>{ if(mapInstance) mapInstance.resize(); }, 300);
      } else setTimeout(()=>renderCountyMap(), 200);
    }));
  }
}

function selectCategory(catId,sub) {
  const cat = CATEGORIES.find(c=>c.id===catId);
  if (!cat) return;
  state.activeCat = catId;
  state.activeSub = sub||subId(cat.subs[0]);
  renderCatRail();
  renderSubNav();
  showPanel(`${catId}::${state.activeSub}`);
}

function selectSub(s) {
  state.activeSub = s;
  renderSubNav();
  showPanel(`${state.activeCat}::${s}`);
}

// ── Rail & subnav ─────────────────────────────────────────────────
function renderCatRail() {
  const rail     = document.getElementById('cat-rail');
  const pinned   = CATEGORIES.filter(c=>state.pinnedCats.includes(c.id));
  const unpinned = CATEGORIES.filter(c=>!state.pinnedCats.includes(c.id));
  let html = '';
  pinned.forEach(c=>{html+=catCard(c,true);});
  if (pinned.length&&unpinned.length) html+='<div class="cat-rail-sep"></div>';
  unpinned.forEach(c=>{html+=catCard(c,false);});
  rail.innerHTML = html;
}

function catCard(cat,isPinned) {
  const isActive = cat.id===state.activeCat;
  const unavail  = !!cat.requiresRef;
  return `<div class="cat-card${isActive?' active':''}${unavail?' unavailable':''}"
    onclick="${unavail?'':` selectCategory('${cat.id}')`}">
    <span class="cat-name">${cat.label}</span>
    <button class="cat-pin${isPinned?' pinned':''}" onclick="event.stopPropagation();togglePin('${cat.id}')" title="${isPinned?'Unpin':'Pin'}">★</button>
  </div>`;
}

function togglePin(catId) {
  const idx = state.pinnedCats.indexOf(catId);
  if (idx>=0) state.pinnedCats.splice(idx,1);
  else state.pinnedCats.push(catId);
  renderCatRail();
  savePref('dashboard.pinned_categories',state.pinnedCats);
}

function renderSubNav() {
  const cat = CATEGORIES.find(c=>c.id===state.activeCat);
  if (!cat) return;
  document.getElementById('sub-nav').innerHTML = cat.subs.map(s=>{
    const sid = subId(s);
    return `<button class="sub-btn${sid===state.activeSub?' active':''}" onclick="selectSub('${sid}')">${s}</button>`;
  }).join('');
}

// ── Summary ───────────────────────────────────────────────────────
function updateSummary(report,trip) {
  const agg = report?.aggregate;
  document.getElementById('sum-finds').textContent    = num(report?.trip_find_count);
  document.getElementById('sum-counties').textContent = num(agg?.newCounties);
  document.getElementById('sum-fp').textContent       = num(agg?.favoritePointsEarned);
  document.getElementById('sum-rules').textContent    = num(report?.ruleResults?.length);
  if (trip?.date_start&&trip?.date_end) {
    const days=Math.round((new Date(trip.date_end+'T00:00:00Z')-new Date(trip.date_start+'T00:00:00Z'))/86400000)+1;
    document.getElementById('sum-days').textContent=days;
  }
  document.getElementById('sum-miles').textContent=trip?.distance_miles?num(trip.distance_miles):'—';
}

// ── Trip selector ─────────────────────────────────────────────────
function openTripSelector(){
  document.getElementById('flyout-overlay').classList.add('open');
  document.getElementById('trip-flyout').classList.add('open');
  loadTripList();
}
function closeTripSelector(){
  document.getElementById('flyout-overlay').classList.remove('open');
  document.getElementById('trip-flyout').classList.remove('open');
}

async function loadTripList() {
  const el=document.getElementById('trip-list-items');
  el.textContent='Loading…';
  const token=await getToken();
  const resp=await fetch(`${BASE}/api/trips`,{headers:{'Authorization':'Bearer '+token}});
  const data=await resp.json();
  const trips=data.trips??[];
  if (!trips.length){el.innerHTML='<p style="color:var(--ink-muted);font-size:0.88rem;">No trips yet.</p>';return;}
  el.innerHTML=trips.map(t=>`
    <div class="trip-list-item${t.trip_id===state.tripId?' active':''}" onclick="selectTrip('${t.trip_id}')">
      <div class="trip-item-name">${t.name}</div>
      <div class="trip-item-dates">${fmtDateRange(t.date_start,t.date_end)}</div>
      <div class="trip-item-status">${t.status}</div>
    </div>`).join('');
}

async function selectTrip(tripId){closeTripSelector();await loadTrip(tripId);}
function newTrip(){closeTripSelector();location.href='/report/';}

// ── Prefs ─────────────────────────────────────────────────────────
function closePrefs(){document.getElementById('prefs-flyout').classList.remove('open');}

function setAnimEnabled(enabled) {
  state.animEnabled=enabled;
  document.getElementById('main-view').classList.toggle('no-anim',!enabled);
  document.getElementById('anim-toggle').classList.toggle('on',enabled);
  document.getElementById('anim-label').textContent=enabled?'Enabled':'Disabled';
}
function toggleAnim(){setAnimEnabled(!state.animEnabled);savePref('dashboard.animations_enabled',state.animEnabled);}

async function savePref(key,value) {
  try {
    const token=await getToken();
    await fetch(`${BASE}/api/preferences/${encodeURIComponent(key)}`,{
      method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({value}),
    });
  } catch(e){console.warn('pref save failed:',e);}
}

// ── Trip loading ──────────────────────────────────────────────────
async function loadTrip(tripId) {
  state.tripId=tripId; state.report=null;
  const url=new URL(location.href);
  url.searchParams.set('id',tripId);
  history.replaceState({},'',url);

  const token=await getToken();
  const tripResp=await fetch(`${BASE}/api/trips/${tripId}`,{headers:{'Authorization':'Bearer '+token}});
  state.trip=await tripResp.json();

  document.getElementById('trip-name-display').textContent  = state.trip.name??'Trip';
  document.getElementById('trip-dates-display').textContent = fmtDateRange(state.trip.date_start,state.trip.date_end);
  document.title=`Routesmith — ${state.trip.name}`;

  try {
    const tok2=await getToken();
    const rr=await fetch(`${BASE}/api/report/trip/${tripId}/result`,{headers:{'Authorization':'Bearer '+tok2}});
    if (rr.ok) {
      state.report=await rr.json();
      document.getElementById('run-report-header-btn').style.display='none';
    } else {
      document.getElementById('run-report-header-btn').style.display='inline-block';
    }
  } catch{ /* no cached result */ }

  updateSummary(state.report,state.trip);
  document.getElementById('main-view').innerHTML='';
  currentPanelId=null;
  showPanel(`${state.activeCat}::${state.activeSub}`);
}

// ── Inline report run ─────────────────────────────────────────────
async function inlineRunReport() {
  const btn      = document.getElementById('inline-run-btn');
  const statusEl = document.getElementById('inline-run-status');
  if (!btn || !state.tripId) return;

  btn.disabled = true;
  btn.textContent = 'Queuing…';
  statusEl.textContent = '';

  try {
    const token = await getToken();
    const enqueueResp = await fetch(`${BASE}/api/report/trip/${state.tripId}/run`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
    });
    const enqueued = await enqueueResp.json();
    if (enqueued.error) throw new Error(enqueued.error);

    const jobId = enqueued.job_id;
    btn.textContent = 'Running…';

    for (let i = 0; i < 60; i++) {
      await new Promise(r => setTimeout(r, 3000));
      statusEl.textContent = `Running… (${(i+1)*3}s)`;
      const tok2 = await getToken();
      const statusResp = await fetch(`${BASE}/api/report/trip/${state.tripId}/status/${jobId}`, {
        headers: { 'Authorization': 'Bearer ' + tok2 },
      });
      const statusData = await statusResp.json();
      if (statusData.error) throw new Error(statusData.error);
      if (statusResp.status === 200) {
        state.report = statusData;
        document.getElementById('run-report-header-btn').style.display = 'none';
        updateSummary(state.report, state.trip);
        // Re-render current panel with report data
        document.getElementById('main-view').innerHTML = '';
        currentPanelId = null;
        showPanel(`${state.activeCat}::${state.activeSub}`);
        return;
      }
    }
    throw new Error('Timed out after 3 minutes.');
  } catch(e) {
    if (statusEl) statusEl.textContent = '✗ ' + e.message;
    if (btn) { btn.disabled = false; btn.textContent = 'Generate Report'; }
  }
}

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  await window.Clerk.load();
  const user=window.Clerk.user;
  if (!user){location.href='/account/';return;}

  const name=user.firstName||user.fullName||user.primaryEmailAddress?.emailAddress||'';
  document.getElementById('header-user-name').textContent=name;

  // Load preferences
  try {
    const token=await getToken();
    const prefResp=await fetch(`${BASE}/api/preferences`,{headers:{'Authorization':'Bearer '+token}});
    const prefData=await prefResp.json();
    state.prefs=prefData.preferences??{};
    state.pinnedCats  = state.prefs['dashboard.pinned_categories']??['counties','highlights'];
    state.animEnabled = state.prefs['dashboard.animations_enabled']!==false;
  } catch{ /* use defaults */ }

  // Fetch Mapbox token from Worker
  try {
    const tok=await getToken();
    const tkResp=await fetch(`${BASE}/api/config/mapbox-token`,{headers:{'Authorization':'Bearer '+tok}});
    const tkData=await tkResp.json();
    MAPBOX_TOKEN=tkData.token??'';
  } catch(e){console.warn('Failed to load Mapbox token:',e);}

  setAnimEnabled(state.animEnabled);

  document.getElementById('trip-selector-btn').addEventListener('click',openTripSelector);
  document.getElementById('prefs-btn').addEventListener('click',()=>{
    document.getElementById('prefs-flyout').classList.toggle('open');
  });
  document.getElementById('signout-btn').addEventListener('click',async()=>{
    await window.Clerk.signOut();location.href='/account/';
  });
  document.getElementById('run-report-header-btn').addEventListener('click',()=>{
    if(state.tripId) location.href=`/report/trip.html?id=${state.tripId}`;
  });

  renderCatRail();
  selectCategory('counties','map');
  document.getElementById('loading-overlay').style.display='none';

  const params=new URLSearchParams(location.search);
  const tripId=params.get('id');
  if (tripId) await loadTrip(tripId);
  else openTripSelector();
});
</script>
