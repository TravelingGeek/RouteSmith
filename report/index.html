<script>
const BASE = 'https://routesmith-report.gtl6645.workers.dev';
const getToken = () => window.Clerk.session.getToken({ template: 'routesmith' });

// ── Date formatting ───────────────────────────────────────────────
function fmtDateRange(start, end) {
  const opts = { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' };
  const s = new Date(start + 'T00:00:00Z').toLocaleDateString('en-US', opts);
  const e = new Date(end   + 'T00:00:00Z').toLocaleDateString('en-US', opts);
  return s === e ? s : `${s} – ${e}`;
}

// ── Trip API ──────────────────────────────────────────────────────
async function loadTrips() {
  const token = await getToken();
  const resp = await fetch(`${BASE}/api/trips`, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!resp.ok) return [];
  const data = await resp.json();
  return data.trips ?? [];
}

async function createTrip(payload) {
  const token = await getToken();
  const resp = await fetch(`${BASE}/api/trips`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  return resp.json();
}

// ── Render trip list ──────────────────────────────────────────────
function renderTrips(trips) {
  const listEl   = document.getElementById('trip-list');
  const emptyEl  = document.getElementById('empty-state');
  listEl.innerHTML = '';

  if (!trips.length) {
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  for (const trip of trips) {
    const card = document.createElement('div');
    card.className = 'trip-card';
    card.innerHTML = `
      <div class="trip-card-left" style="cursor:pointer;">
        <div class="trip-card-name">${esc(trip.name)}</div>
        <div class="trip-card-dates">${trip.date_start && trip.date_end ? fmtDateRange(trip.date_start, trip.date_end) : 'Dates not set'}</div>
      </div>
      <div class="trip-card-right">
        <span class="trip-status ${trip.status}">${trip.status}</span>
        <button class="trip-action-btn" data-action="run"  data-id="${trip.trip_id}">Run Report</button>
        <button class="trip-action-btn" data-action="edit" data-id="${trip.trip_id}">Edit</button>
        <button class="trip-action-btn trip-action-btn-danger" data-action="delete" data-id="${trip.trip_id}" data-name="${esc(trip.name)}">Delete</button>
      </div>`;
    card.querySelector('.trip-card-left').addEventListener('click', () => {
      location.href = `/dashboard/?id=${trip.trip_id}`;
    });
    card.querySelectorAll('.trip-action-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const action = btn.dataset.action;
        const id     = btn.dataset.id;
        if (action === 'edit') {
          location.href = `/report/trip.html?id=${id}`;
        } else if (action === 'run') {
          location.href = `/dashboard/?id=${id}&run=1`;
        } else if (action === 'delete') {
          const name = btn.dataset.name;
          if (!confirm(`Delete "${name}"?\n\nThis cannot be undone.`)) return;
          btn.disabled = true;
          btn.textContent = 'Deleting…';
          try {
            const token = await getToken();
            const resp = await fetch(`${BASE}/api/trips/${id}`, {
              method:'DELETE', headers:{'Authorization':'Bearer '+token}
            });
            const result = await resp.json();
            if (result.error) throw new Error(result.error);
            await loadTrips();
          } catch(err) {
            alert('Delete failed: ' + err.message);
            btn.disabled = false;
            btn.textContent = 'Delete';
          }
        }
      });
    });
    listEl.appendChild(card);
  }
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Modal ─────────────────────────────────────────────────────────
const modal       = document.getElementById('trip-modal');
const modalTitle  = document.getElementById('modal-title');
const modalSave   = document.getElementById('modal-save');
const modalCancel = document.getElementById('modal-cancel');

function openModal() {
  document.getElementById('trip-name').value        = '';
  document.getElementById('trip-description').value = '';
  document.getElementById('trip-start').value       = '';
  document.getElementById('trip-end').value         = '';
  document.getElementById('trip-miles').value       = '';
  document.getElementById('trip-hours').value       = '';
  document.getElementById('trip-gas').value         = '';
  modal.classList.add('open');
  document.getElementById('trip-name').focus();
}

function closeModal() { modal.classList.remove('open'); }

document.getElementById('new-trip-btn').addEventListener('click', openModal);

// Auto-fill end date when start date is set
document.getElementById('trip-start').addEventListener('change', () => {
  const start = document.getElementById('trip-start').value;
  const end   = document.getElementById('trip-end').value;
  if (start && !end) {
    const d = new Date(start + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + 1);
    document.getElementById('trip-end').value = d.toISOString().slice(0, 10);
  }
});
modalCancel.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

modalSave.addEventListener('click', async () => {
  const name  = document.getElementById('trip-name').value.trim();
  const start = document.getElementById('trip-start').value;
  const end   = document.getElementById('trip-end').value;

  if (!name) { document.getElementById('trip-name').focus(); return; }
  if (!start || !end) { alert('Please set start and end dates.'); return; }
  if (start > end) { alert('End date must be on or after start date.'); return; }
  const startYear = parseInt(start.slice(0, 4));
  const endYear   = parseInt(end.slice(0, 4));
  const currentYear = new Date().getFullYear();
  if (startYear < 2000 || startYear > currentYear + 5) { alert('Start date year looks wrong — please check.'); return; }
  if (endYear   < 2000 || endYear   > currentYear + 5) { alert('End date year looks wrong — please check.'); return; }

  modalSave.disabled = true;
  modalSave.textContent = 'Creating…';

  const payload = {
    name,
    description: document.getElementById('trip-description').value.trim() || null,
    date_start: start,
    date_end: end,
    distance_miles: parseFloat(document.getElementById('trip-miles').value) || null,
    distance_hours: parseFloat(document.getElementById('trip-hours').value) || null,
    gas_cost: parseFloat(document.getElementById('trip-gas').value) || null,
  };

  try {
    const result = await createTrip(payload);
    if (result.error) throw new Error(result.error);
    closeModal();
    const trips = await loadTrips();
    renderTrips(trips);
  } catch (e) {
    alert('Failed to create trip: ' + e.message);
  } finally {
    modalSave.disabled = false;
    modalSave.textContent = 'Create Trip';
  }
});

// ── Auth ──────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  await window.Clerk.load();

  const loadingEl   = document.getElementById('loading-state');
  const authGate    = document.getElementById('auth-gate');
  const mainContent = document.getElementById('main-content');
  const navUser     = document.getElementById('nav-user');
  const navUserName = document.getElementById('nav-user-name');
  const navSigninLink  = document.getElementById('nav-signin-link');
  const navSignoutBtn  = document.getElementById('nav-signout-btn');

  async function showSignedIn(user) {
    const name = user.firstName || user.fullName || user.primaryEmailAddress?.emailAddress || 'Cacher';
    loadingEl.style.display    = 'none';
    authGate.style.display     = 'none';
    mainContent.style.display  = 'block';
    navSigninLink.style.display = 'none';
    navUser.style.display = 'flex';
    navUserName.textContent = name;

    const trips = await loadTrips();
    renderTrips(trips);
  }

  function showSignedOut() {
    loadingEl.style.display    = 'none';
    mainContent.style.display  = 'none';
    authGate.style.display     = 'block';
    navUser.style.display      = 'none';
    navSigninLink.style.display = 'inline-block';
  }

  navSignoutBtn.addEventListener('click', async () => {
    await window.Clerk.signOut();
    showSignedOut();
  });

  const user = window.Clerk.user;
  if (user) showSignedIn(user);
  else showSignedOut();

  window.Clerk.addListener(({ user }) => {
    if (user) showSignedIn(user);
    else showSignedOut();
  });
});
</script>
